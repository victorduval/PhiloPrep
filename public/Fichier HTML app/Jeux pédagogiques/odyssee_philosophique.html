<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'Odyssée philosophique — Démo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* =============================================================================
       Variables & reset — palette peinte / cinéma antique (extensible)
       ============================================================================= */
    :root {
      --gold: #D4AF37;
      --gold-light: #FFD700;
      --gold-dark: #B8860B;
      --bronze: #CD7F32;
      --marble: #F5F5DC;
      --night-deep: #0a0e27;
      --night-medium: #1a1f3a;
      --night-light: #2a2f4a;
      --purple: #6B46C1;
      --purple-light: #9F7AEA;
      --red-accent: #C53030;
      --ochre: #CC7722;
      --terracotta: #D4735E;
      --font-title: "Cinzel", serif;
      --font-body: "Crimson Pro", Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    html, body {
      height: 100%;
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #1e2448 0%, var(--night-deep) 55%, #05060f 100%);
      color: var(--marble);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.55;
      overflow: hidden;
    }

    /* Arrière-plan : particules dorées (léger, performant) */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--gold);
      opacity: 0.45;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-12px) translateX(6px); }
      50% { transform: translateY(4px) translateX(-8px); }
      75% { transform: translateY(14px) translateX(4px); }
    }

    #game-container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0;
      height: 100%;
      max-height: 100dvh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .game-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .btn-game-menu {
      position: absolute;
      top: max(0.4rem, env(safe-area-inset-top, 0px));
      right: max(0.45rem, env(safe-area-inset-right, 0px));
      z-index: 40;
      font-family: var(--font-title);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.55rem 0.95rem;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid rgba(212, 175, 55, 0.5);
      background: rgba(10, 14, 39, 0.88);
      color: var(--gold-light);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-game-menu:active {
      transform: scale(0.98);
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 350;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(0.75rem, env(safe-area-inset-top, 0px)) max(0.75rem, env(safe-area-inset-right, 0px)) max(0.75rem, env(safe-area-inset-bottom, 0px)) max(0.75rem, env(safe-area-inset-left, 0px));
      box-sizing: border-box;
    }
    .modal-layer.is-open {
      display: flex;
    }
    .modal-layer-notebook {
      z-index: 360;
    }
    .modal-scrim {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 20, 0.78);
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }
    .modal-panel-menu {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 340px;
      border-radius: 16px;
      padding: 1.35rem 1.25rem;
      background: rgba(26, 31, 58, 0.96);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(212, 175, 55, 0.28);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.55);
    }
    .modal-panel-menu h2 {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 1rem;
      text-align: center;
    }
    .menu-actions-stack {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .menu-actions-stack .btn-menu-item {
      width: 100%;
      font-family: var(--font-title);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--marble);
      transition: background 0.2s, border-color 0.2s;
    }
    .menu-actions-stack .btn-menu-item:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: rgba(212, 175, 55, 0.35);
    }
    .btn-menu-secondary {
      margin-top: 0.35rem;
      background: transparent !important;
      border-style: dashed !important;
      opacity: 0.9;
    }
    .btn-menu-close {
      margin-top: 0.85rem;
      width: 100%;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: rgba(245, 245, 220, 0.55);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .modal-panel-notebook {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      max-height: min(85dvh, 640px);
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      padding: 1.15rem 1.1rem 1rem;
      background: rgba(26, 31, 58, 0.96);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.28);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.55);
    }
    .modal-panel-notebook h2 {
      font-family: var(--font-title);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin: 0 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.25);
      flex-shrink: 0;
    }
    .modal-panel-notebook #notebook-list {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding-right: 0.25rem;
    }

    .btn-ghost, .btn-gold {
      font-family: var(--font-title);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: var(--marble);
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.12); border-color: var(--gold-dark); }
    .btn-gold {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(184, 134, 11, 0.15));
      border-color: var(--gold-dark);
      color: var(--gold-light);
    }
    .btn-gold:hover { transform: translateY(-1px); }

    #game-screen {
      flex: 1 1 0;
      min-height: 0;
      border-radius: 0;
      position: relative;
      overflow: hidden;
      background: rgba(10, 14, 39, 0.5);
      border: none;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.35);
    }
    @media (min-width: 900px) {
      #game-screen {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        margin: 0.5rem;
        max-height: calc(100dvh - 1rem);
      }
      #game-container {
        padding: 0.25rem 0;
      }
    }

    #notebook-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding-right: 0.25rem;
    }
    .notebook-entry {
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.92rem;
    }
    .notebook-entry strong { color: var(--gold-light); font-weight: 600; }
    .notebook-entry p { margin-top: 0.35rem; opacity: 0.88; font-size: 0.85rem; }
    .notebook-empty {
      opacity: 0.55;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* Scène dialogue */
    .dialogue-scene {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(200px, 32%) 1fr;
      grid-template-rows: 1fr auto;
      height: 100%;
      animation: fadeIn 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 720px) {
      .dialogue-scene {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100%;
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Calque décor : image plein écran + léger voile lisibilité + vignette bords */
    .scene-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.75;
      z-index: 0;
      overflow: hidden;
    }
    .scene-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.92;
      filter: blur(0) saturate(1.12) brightness(1.02);
      transform: none;
      transition: opacity 0.8s ease, filter 0.8s ease;
    }
    .scene-bg-gradient {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        100deg,
        rgba(10, 14, 39, 0.42) 0%,
        rgba(10, 14, 39, 0.12) 40%,
        rgba(10, 14, 39, 0.35) 100%
      );
    }
    .scene-background::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(
        ellipse 95% 90% at 50% 45%,
        transparent 0%,
        transparent 38%,
        rgba(10, 14, 39, 0.35) 72%,
        rgba(10, 14, 39, 0.72) 100%
      );
    }

    .character-portrait {
      position: relative;
      z-index: 2;
      grid-column: 1;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 1.25rem 1rem 1.5rem;
      gap: 0.5rem;
    }
    @media (max-width: 720px) {
      .character-portrait {
        grid-row: 1;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        align-items: flex-end;
        padding: 0.45rem 0.5rem 0.35rem;
        max-height: 32vh;
      }
    }
    .portrait-frame {
      width: min(220px, 85vw);
      aspect-ratio: 3/4;
      border-radius: 14px;
      padding: 5px;
      border: 2px solid rgba(212, 175, 55, 0.65);
      background: linear-gradient(145deg, var(--gold-dark), var(--bronze), var(--night-medium));
      box-shadow: 0 22px 58px rgba(0, 0, 0, 0.78);
      position: relative;
      z-index: 2;
    }
    .portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      filter: contrast(1.1) saturate(1.15) brightness(1.02);
      background: #222;
    }
    .character-name {
      font-family: var(--font-title);
      font-size: 1.15rem;
      color: var(--gold-light);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
    }
    .character-title {
      font-size: 0.82rem;
      opacity: 0.85;
      text-align: center;
      max-width: 260px;
    }

    .dialogue-box {
      position: relative;
      z-index: 2;
      grid-column: 2;
      grid-row: 1 / -1;
      margin: 1rem 1rem 1rem 0;
      padding: 1rem 1.1rem 1.1rem;
      align-self: end;
      min-height: 0;
      max-height: calc(100% - 2rem);
      overflow-y: auto;
      overflow-x: hidden;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    @media (max-width: 720px) {
      .portrait-frame {
        width: min(112px, 30vw);
      }
      .character-name { font-size: 0.95rem; }
      .character-title { font-size: 0.68rem; max-width: 200px; }
      .dialogue-box {
        grid-column: 1;
        grid-row: 2;
        margin: 0 0.5rem 0.5rem;
        min-height: 0;
        max-height: none;
        align-self: stretch;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
    }
    .dialogue-text {
      max-height: none;
      overflow-y: visible;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      padding: 36px 30px 30px;
      border-left: 4px solid var(--purple-light);
      font-size: 1.2em;
      line-height: 1.9;
      margin-bottom: 25px;
    }
    @media (max-width: 720px) {
      .dialogue-text {
        padding: 14px 14px 16px;
        font-size: 1rem;
        line-height: 1.65;
        margin-bottom: 12px;
      }
      .choice-btn {
        font-size: 0.95rem;
        padding: 0.75rem 0.95rem;
      }
    }
    .dialogue-text p,
    .dialogue-text .dialogue-line {
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95);
    }
    .dialogue-line {
      margin-bottom: 0.65rem;
      opacity: 0;
      animation: lineReveal 0.5s ease forwards;
    }
    .dialogue-line:nth-child(1) { animation-delay: 0.05s; }
    .dialogue-line:nth-child(2) { animation-delay: 0.15s; }
    .dialogue-line:nth-child(3) { animation-delay: 0.25s; }
    .dialogue-line:nth-child(4) { animation-delay: 0.35s; }
    .dialogue-line:nth-child(5) { animation-delay: 0.45s; }
    .dialogue-line:nth-child(n+6) { animation-delay: 0.55s; }
    @keyframes lineReveal {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .dialogue-line.speaker-narration {
      font-style: italic;
      color: #c4b8a8;
      border-left: 3px solid var(--bronze);
      padding-left: 0.75rem;
    }
    .dialogue-line .speaker-tag {
      font-family: var(--font-title);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .choice-btn {
      position: relative;
      overflow: hidden;
      text-align: left;
      font-family: var(--font-body);
      font-size: 1.05rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid rgba(107, 70, 193, 0.85);
      background: linear-gradient(
        135deg,
        rgba(107, 70, 193, 0.88),
        rgba(74, 50, 120, 0.82)
      );
      color: var(--marble);
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.5);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s, filter 0.2s;
    }
    .choice-btn:hover {
      border-color: var(--gold-light);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
      transform: translateX(4px);
      filter: brightness(1.05);
    }
    .choice-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      transition: left 0.55s ease;
    }
    .choice-btn:hover::before { left: 100%; }

    .wrong-attempt-panel {
      margin-top: 1.25rem;
      padding: 1.35rem 1.5rem 1.5rem;
      border-radius: 14px;
      border: 1px solid rgba(159, 122, 234, 0.5);
      background: rgba(10, 14, 39, 0.72);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.35s ease;
    }
    .wrong-attempt-title {
      font-family: var(--font-title);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 0.85rem;
    }
    .wrong-attempt-body {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--marble);
      margin-bottom: 1.25rem;
    }
    .wrong-attempt-body p + p {
      margin-top: 0.75rem;
    }
    .btn-retry-wrong {
      font-family: var(--font-title);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.72rem;
      padding: 0.75rem 1.5rem;
      margin-top: 0;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #1a1020;
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
    }
    .btn-retry-wrong:hover { filter: brightness(1.08); }

    .btn-continue {
      font-family: var(--font-title);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.72rem;
      padding: 0.75rem 1.25rem;
      margin-top: 0.25rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #1a1020;
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.25);
    }
    .btn-continue:hover { filter: brightness(1.08); }

    /* Transition & ending */
    .panel-center {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 2rem auto;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }
    .panel-center h2 {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .panel-center p, .panel-center li { text-align: left; }
    .panel-center .subtitle { opacity: 0.85; margin-bottom: 1.25rem; }
    .panel-center ul { margin: 0.75rem 0 0 1.25rem; }
    .unlocked-notions, .demo-info {
      text-align: left;
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .panel-center code {
      font-size: 0.85em;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }

    /* Mini-jeu tri */
    .minigame-wrap {
      position: relative;
      z-index: 2;
      padding: 1rem;
      height: 100%;
      overflow-y: auto;
      animation: fadeIn 0.6s ease;
    }
    .minigame-wrap h2 {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 1.15rem;
      margin-bottom: 0.35rem;
    }
    .minigame-instruction {
      opacity: 0.88;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .sorting-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 720px) {
      .sorting-grid { grid-template-columns: 1fr; }
    }
    .drop-zone {
      min-height: 140px;
      padding: 0.5rem;
      border-radius: 12px;
      border: 2px dashed rgba(212, 175, 55, 0.35);
      background: rgba(0, 0, 0, 0.2);
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.drag-over {
      border-color: var(--gold-light);
      background: rgba(107, 70, 193, 0.12);
    }
    .drop-zone h3 {
      font-family: var(--font-title);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.2rem;
    }
    .drop-zone .hint { font-size: 0.75rem; opacity: 0.65; margin-bottom: 0.5rem; }

    .card-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 1rem;
    }
    .sort-card {
      cursor: grab;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(42, 47, 74, 0.95), rgba(26, 31, 58, 0.9));
      border: 1px solid rgba(212, 175, 55, 0.25);
      font-size: 0.85rem;
      max-width: 100%;
      touch-action: none;
    }
    .sort-card:active { cursor: grabbing; }

      color: transparent;

      line-height: 1.65;

      background: rgba(0, 0, 0, 0.38);

      gap: 0.75rem;

      align-items: center;

      padding: 1rem;

    .modal glass-panel, .glass-panel {

      justify-content: center;

        },
        raison: {

    // --- État runtime (complété par load ou défaut) ---
    const defaultState = () => ({
      version: "1.0",
      currentScene: "intro_1",
      skills: { clarte: 15, justification: 15, examen: 15 },
      notebookNotionKeys: [],
      unlockedPhilosophers: ["socrate", "platon"],
      settings: {}
    });

    let gameState = defaultState();

    // --- Moteurs de mini-jeux extensibles ---
    // Règle : ne jamais appeler goToScene tant que l'épreuve n'est pas réussie (ex. sorting : ratio >= successThreshold, défaut 1).
    const miniGameEngines = {
      sorting: {
        state: null,
        render(scene) {
          const items = [...scene.items].sort(() => Math.random() - 0.5);
          const cats = scene.categories;
          this.state = { scene, placements: {} };
          const gameScreen = document.getElementById("game-screen");
          gameScreen.innerHTML = `
            <div class="minigame-wrap">
              <h2>${scene.title}</h2>
              <p class="minigame-instruction">${scene.instruction}</p>
              <div class="card-bank" id="sort-bank" aria-label="Affirmations à classer"></div>
              <div class="sorting-grid" id="sort-zones"></div>
              <div class="minigame-actions">
                <button type="button" class="btn-continue" id="btn-validate-sort">Valider</button>
              </div>
            </div>`;
          const bank = document.getElementById("sort-bank");
          const zonesEl = document.getElementById("sort-zones");
          cats.forEach((c) => {
            zonesEl.innerHTML += `
              <div class="drop-zone" data-category="${c.id}" aria-dropeffect="move">
                <h3>${c.label}</h3>
                <p class="hint">${c.description}</p>
                <div class="zone-cards" data-zone="${c.id}"></div>
              </div>`;
          });
          items.forEach((it) => {
            const el = document.createElement("div");
            el.className = "sort-card";
            el.draggable = true;
            el.dataset.itemId = String(it.id);
            el.textContent = it.text;
            el.addEventListener("dragstart", onSortDragStart);
            bank.appendChild(el);
          });
          zonesEl.querySelectorAll(".drop-zone").forEach((z) => {
            z.addEventListener("dragover", onSortDragOver);
            z.addEventListener("dragleave", onSortDragLeave);
            z.addEventListener("drop", onSortDrop);
          });
          document.getElementById("btn-validate-sort").addEventListener("click", () => this.validate());
        },
        validate() {
          const { scene, placements } = this.state;
          let correct = 0;
          const n = scene.items.length;
          scene.items.forEach((it) => {
            if (placements[it.id] === it.correct) correct++;
          });
          const ratio = correct / n;
          const th = scene.successThreshold ?? 1;

          if (ratio < th) {
            const wrap = document.querySelector(".minigame-wrap");
            const body =
              th >= 1
                ? `<p>Tu as <strong>${correct} sur ${n}</strong> affirmations bien placées. Pour cette épreuve, il faut un classement <em>parfait</em> : chaque carte doit être dans la colonne qui correspond vraiment à sa nature (opinion, argument ou sophisme).</p><p>Repère les cartes qui « sonnent » comme un raisonnement valide mais cachent une ruse, ou celles qui ne sont qu'une croyance non examinée. Tu peux déplacer les cartes puis valider à nouveau.</p>`
                : `<p>Résultat : <strong>${correct} / ${n}</strong>. Il te faut un meilleur score pour continuer. Ajuste les cartes dans les colonnes, puis valide de nouveau.</p>`;
            if (wrap) {
              showWrongAttemptPanel(wrap, {
                title: "Classement à corriger",
                bodyHtml: body
              });
            }
            return;
          }

          let tier = ratio >= 1 ? "perfect" : "good";
          const rewards = scene.rewards[tier] || {};
          Object.keys(rewards).forEach((k) => updateSkill(k, rewards[k]));
          showToast(
            tier === "perfect"
              ? `Bravo ! ${correct}/${n} — performance parfaite.`
              : `Très bien ! ${correct}/${n} — tu peux poursuivre.`
          );
          gameState.currentScene = scene.nextScene;
          saveGame();
          setTimeout(() => renderScene(gameState.currentScene), 1600);
        }
      }
    };

    let draggedCard = null;

    function onSortDragStart(e) {
      draggedCard = e.target;
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", e.target.dataset.itemId);
    }
    function onSortDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add("drag-over");
    }
    function onSortDragLeave(e) {
      e.currentTarget.classList.remove("drag-over");
    }
    function onSortDrop(e) {
      e.preventDefault();
      const zone = e.currentTarget;
      zone.classList.remove("drag-over");
      const cat = zone.dataset.category;
      const inner = zone.querySelector(".zone-cards");
      if (!draggedCard || !inner) return;
      const id = parseInt(draggedCard.dataset.itemId, 10);
      const engine = miniGameEngines.sorting;
      if (engine.state) engine.state.placements[id] = cat;
      inner.appendChild(draggedCard);
      draggedCard.classList.add("placed");
    }

    // --- Progression & carnet ---
    function updateSkill(skillName, delta) {
      if (!gameState.skills[skillName]) gameState.skills[skillName] = 0;
      gameState.skills[skillName] = Math.min(100, gameState.skills[skillName] + (delta || 0));
      refreshSkillBars();
    }

    function refreshSkillBars() {
      /* Barres de compétences retirées de l’interface ; les scores restent dans gameState. */
    }

    function addNotionsToNotebook(keys) {
      if (!keys || !keys.length) return;
      keys.forEach((k) => {
        if (!gameData.notions[k]) return;
        if (gameState.notebookNotionKeys.includes(k)) return;
        gameState.notebookNotionKeys.push(k);
        showToast("Notion débloquée : " + gameData.notions[k].name);
      });
      renderNotebook();
    }

    function renderNotebook() {
      const list = document.getElementById("notebook-list");
      if (!gameState.notebookNotionKeys.length) {
        list.innerHTML = "<p class=\"notebook-empty\">Aucune notion encore. Progressez dans l'histoire pour remplir ce carnet.</p>";
        return;
      }
      list.innerHTML = gameState.notebookNotionKeys.map((key) => {
        const n = gameData.notions[key];
        if (!n) return "";
        const ex = (n.examples || []).slice(0, 2).map((e) => `<li>${e}</li>`).join("");
        return `<div class="notebook-entry">
          <strong>${n.name}</strong>
          <p>${n.description}</p>
          ${ex ? "<ul style='margin:0.4rem 0 0 1rem;font-size:0.82rem;opacity:0.9'>" + ex + "</ul>" : ""}
        </div>`;
      }).join("");
    }

    function saveGame() {
      const payload = {
        version: "1.0",
        timestamp: Date.now(),
        currentScene: gameState.currentScene,
        skills: { ...gameState.skills },
        notebookNotionKeys: [...gameState.notebookNotionKeys],
        unlockedPhilosophers: [...gameState.unlockedPhilosophers],
        settings: { ...gameState.settings }
      };
      try {
        localStorage.setItem(STORAGE_KEYS.save, JSON.stringify(payload));
        showToast("Partie sauvegardée.");
      } catch (e) {
        showToast("Impossible de sauvegarder (stockage plein ?).");
      }
    }

    function loadGame() {
      const raw = localStorage.getItem(STORAGE_KEYS.save);
      if (!raw) {
        showToast("Aucune sauvegarde trouvée.");
        return false;
      }
      try {
        const data = JSON.parse(raw);
        gameState.currentScene = data.currentScene || "intro_1";
        gameState.skills = { ...defaultState().skills, ...data.skills };
        gameState.notebookNotionKeys = data.notebookNotionKeys || [];
        gameState.unlockedPhilosophers = data.unlockedPhilosophers || defaultState().unlockedPhilosophers;
        gameState.settings = data.settings || {};
        refreshSkillBars();
        renderNotebook();
        renderScene(gameState.currentScene);
        showToast("Partie chargée.");
        return true;
      } catch (e) {
        showToast("Sauvegarde corrompue.");
        return false;
      }
    }

    function showToast(msg, durationMs) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("visible");
      clearTimeout(showToast._h);
      showToast._h = setTimeout(() => t.classList.remove("visible"), durationMs ?? 3200);
    }

    /**
     * Panneau d'échec lisible + bouton « Réessayer » (retire le panneau ; ne change pas la scène).
     */
    function showWrongAttemptPanel(container, opts) {
      if (!container) return;
      const title = opts.title || "Pas tout à fait";
      const bodyHtml = opts.bodyHtml || "<p>Réessaie avec une autre réponse.</p>";
      const retryLabel = opts.retryLabel || "Réessayer";
      container.querySelectorAll(".wrong-attempt-panel").forEach((el) => el.remove());
      const panel = document.createElement("div");
      panel.className = "wrong-attempt-panel";
      panel.setAttribute("role", "alert");
      panel.innerHTML =
        `<h4 class="wrong-attempt-title">${title}</h4>` +
        `<div class="wrong-attempt-body">${bodyHtml}</div>` +
        `<button type="button" class="btn-retry-wrong">${retryLabel}</button>`;
      panel.querySelector(".btn-retry-wrong").addEventListener("click", () => panel.remove());
      container.appendChild(panel);
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function getSceneById(id) {
      return gameData.scenes.find((s) => s.id === id);
    }

    function getBackgroundStyle(key) {
      const k = BACKGROUND_KEY_ALIASES[key] || key;
      return BACKGROUNDS[key] || BACKGROUNDS[k] || "linear-gradient(180deg, #1a1f3a, #0a0e27)";
    }

    /**
     * Arrière-plan dialogue : image locale (jpg → repli svg) + voile lisible,
     * ou uniquement le dégradé CSS si aucun fichier n'est défini pour cette clé.
     */
    function buildSceneBackgroundHtml(sceneBackgroundKey) {
      const mapKey = BACKGROUND_KEY_ALIASES[sceneBackgroundKey] || sceneBackgroundKey;
      const jpgTarget = IMAGE_PATHS.backgrounds[mapKey];
      const grad = getBackgroundStyle(sceneBackgroundKey);
      if (!jpgTarget) {
        return `<div class="scene-bg-gradient" style="background:${grad}"></div>`;
      }
      const src = resolveFromJpgTarget(jpgTarget);
      const svg = svgFallbackForPath(jpgTarget);
      const isJpg = /\.jpe?g$/i.test(src);
      const url = assetUrl(src);
      const svgUrl = assetUrl(svg);
      const oe = isJpg ? ` onerror="this.onerror=null;this.src='${escapeAttrSingle(svgUrl)}'"` : "";
      return `<img class="scene-bg-img" src="${url}" alt="" decoding="async"${oe} /><div class="scene-bg-gradient"></div>`;
    }

    /** Portrait : voir getImagePath('portraits', clé) — .jpg réels ou .svg placeholder. */
    function buildPortraitImgHtml(philosopherKey, altText) {
      const jpgTarget = IMAGE_PATHS.portraits[philosopherKey];
      if (!jpgTarget) {
        const svg = "data:image/svg+xml," + encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533"><rect fill="#2a2f4a" width="100%" height="100%"/><text x="50%" y="50%" fill="#D4AF37" font-family="serif" font-size="18" text-anchor="middle">Portrait</text></svg>`
        );
        return `<img class="portrait-img" src="${svg}" alt="${altText || ""}" loading="lazy" width="220" height="294" />`;
      }
      const src = resolveFromJpgTarget(jpgTarget);
      const svg = svgFallbackForPath(jpgTarget);
      const isJpg = /\.jpe?g$/i.test(src);
      const url = assetUrl(src);
      const svgUrl = assetUrl(svg);
      const oe = isJpg ? ` onerror="this.onerror=null;this.src='${escapeAttrSingle(svgUrl)}'"` : "";
      return `<img class="portrait-img" src="${url}" alt="${altText || ""}" loading="lazy" width="220" height="294"${oe} />`;
    }

    let narrativeSequenceTimer = null;
    function clearNarrativeSequenceTimer() {
      if (narrativeSequenceTimer) {
        clearTimeout(narrativeSequenceTimer);
        narrativeSequenceTimer = null;
      }
    }

    function renderNarrativeSequence(scene) {
      clearNarrativeSequenceTimer();
      const screen = document.getElementById("game-screen");
      const slides = scene.images || [];
      let index = 0;

      function finishSequence() {
        clearNarrativeSequenceTimer();
        goToScene(scene.nextScene);
      }

      function showSlide() {
        if (index >= slides.length) {
          finishSequence();
          return;
        }
        const step = slides[index];
        const relSrc = resolveFromJpgTarget(step.path);
        const svg = svgFallbackForPath(step.path);
        const isJpg = /\.jpe?g$/i.test(relSrc);
        const imgUrl = assetUrl(relSrc);
        const svgUrl = assetUrl(svg);
        const oe = isJpg ? ` onerror="this.onerror=null;this.src='${escapeAttrSingle(svgUrl)}'"` : "";

        screen.innerHTML = `
          <div class="narrative-sequence fade-in">
            <h2 class="narrative-title">${scene.title}</h2>
            <div class="narrative-image-container">
              <img class="narrative-image" src="${imgUrl}" alt="" decoding="async"${oe} />
            </div>
            <div class="narrative-text"><p>${step.text}</p></div>
            <div class="narrative-progress">Image ${index + 1} / ${slides.length}</div>
            <div class="narrative-actions">
              <button type="button" class="btn-continue" id="narrative-next">Suivant →</button>
              <button type="button" class="btn-ghost" id="narrative-skip">Passer la séquence</button>
            </div>
          </div>`;

        const dur = Math.max(800, Number(step.duration) || 6000);
        clearNarrativeSequenceTimer();
        narrativeSequenceTimer = setTimeout(() => {
          narrativeSequenceTimer = null;
          index++;
          showSlide();
        }, dur);

        document.getElementById("narrative-next").addEventListener("click", () => {
          clearNarrativeSequenceTimer();
          index++;
          showSlide();
        });
        document.getElementById("narrative-skip").addEventListener("click", () => {
          clearNarrativeSequenceTimer();
          finishSequence();
        });
      }

      showSlide();
    }

    /**
     * Rendu principal : route selon scene.type.
     * Pour ajouter un type : étendre ce switch + miniGameEngines ou un nouveau renderer.
     */
    function renderScene(sceneId) {
      clearNarrativeSequenceTimer();
      const scene = getSceneById(sceneId);
      if (!scene) {
        document.getElementById("game-screen").innerHTML = "<p style='padding:2rem'>Scène introuvable.</p>";
        return;
      }
      gameState.currentScene = sceneId;

      if (scene.type === "dialogue") renderDialogue(scene);
      else if (scene.type === "minigame") {
        const engine = miniGameEngines[scene.gameType];
        if (engine && engine.render) engine.render(scene);
        else document.getElementById("game-screen").innerHTML = "<p style='padding:2rem'>Mini-jeu non implémenté.</p>";
      } else if (scene.type === "transition") renderTransition(scene);
      else if (scene.type === "narrative_sequence") renderNarrativeSequence(scene);
      else if (scene.type === "ending") renderEnding(scene);
      else document.getElementById("game-screen").innerHTML = "<p style='padding:2rem'>Type de scène inconnu.</p>";

      if (scene.type !== "narrative_sequence" && scene.unlocksNotions) addNotionsToNotebook(scene.unlocksNotions);
      if (scene.type === "narrative_sequence") {
        try {
          localStorage.setItem(STORAGE_KEYS.save, JSON.stringify({
            version: "1.0",
            timestamp: Date.now(),
            currentScene: gameState.currentScene,
            skills: { ...gameState.skills },
            notebookNotionKeys: [...gameState.notebookNotionKeys],
            unlockedPhilosophers: [...gameState.unlockedPhilosophers],
            settings: { ...gameState.settings }
          }));
        } catch (e) { /* ignore */ }
      } else saveGame();
    }

    function renderDialogue(scene) {
      const ph = gameData.philosophers[scene.philosopher];
      const lines = (scene.dialogues || []).map((line, idx) => {
        const isNarration = line.speaker === "narration";
        const speakerLabel = isNarration ? "Narration" : (ph && line.speaker === scene.philosopher ? ph.name : line.speaker);
        const cls = isNarration ? "dialogue-line speaker-narration" : "dialogue-line";
        const tag = isNarration ? "" : `<div class="speaker-tag">${speakerLabel}</div>`;
        return `<div class="${cls}" style="animation-delay:${0.05 + idx * 0.08}s">${tag}<div>${line.text}</div></div>`;
      }).join("");

      let choicesHtml = "";
      if (scene.choices && scene.choices.length) {
        choicesHtml = `<div class="choices">${scene.choices.map((c, i) =>
          `<button type="button" class="choice-btn" data-scene="${scene.id}" data-index="${i}">${c.text}</button>`
        ).join("")}</div>`;
      } else if (scene.action === "continue") {
        choicesHtml = `<button type="button" class="btn-continue" data-next="${scene.nextScene}">Continuer</button>`;
      }

      const bgInner = buildSceneBackgroundHtml(scene.background || "athens_agora");
      const portraitImg = buildPortraitImgHtml(scene.philosopher, ph ? ph.name : "");

      document.getElementById("game-screen").innerHTML = `
        <div class="dialogue-scene fade-in">
          <div class="scene-background">${bgInner}</div>
          <div class="character-portrait">
            <div class="portrait-frame">
              ${portraitImg}
            </div>
            <div class="character-name">${ph ? ph.name : ""}</div>
            <div class="character-title">${ph ? ph.title : ""}</div>
          </div>
          <div class="dialogue-box">
            <div class="dialogue-text">${lines}</div>
            ${choicesHtml}
          </div>
        </div>`;

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.index, 10);
          selectChoice(scene.id, idx);
        });
      });
      const cont = document.querySelector(".btn-continue[data-next]");
      if (cont) cont.addEventListener("click", () => goToScene(cont.dataset.next));
    }

    function selectChoice(sceneId, choiceIndex) {
      const scene = getSceneById(sceneId);
      const ch = scene.choices[choiceIndex];
      if (ch.correct !== true) {
        const box = document.querySelector(".dialogue-box");
        const body =
          ch.wrongExplanation ||
          (ch.feedback ? `<p>${ch.feedback}</p>` : "<p>Ce n'est pas la réponse attendue. Choisis une autre option.</p>");
        if (box) {
          showWrongAttemptPanel(box, {
            title: "Pas tout à fait",
            bodyHtml: body
          });
        }
        return;
      }
      if (ch.skillGain) Object.keys(ch.skillGain).forEach((k) => updateSkill(k, ch.skillGain[k]));
      if (ch.feedback) showToast(ch.feedback);
      setTimeout(() => goToScene(ch.nextScene), ch.feedback ? 1800 : 400);
    }

    function goToScene(nextId) {
      const next = getSceneById(nextId);
      if (next && next.unlocksNotions) addNotionsToNotebook(next.unlocksNotions);
      gameState.currentScene = nextId;
      saveGame();
      renderScene(nextId);
    }

    function renderTransition(scene) {
      const bgHtml = buildSceneBackgroundHtml("athens_agora");
      document.getElementById("game-screen").innerHTML = `
        <div class="scene-background" style="position:absolute;inset:0">${bgHtml}</div>
        <div class="panel-center glass-panel" style="position:relative;margin-top:10vh">
          <h2>${scene.title}</h2>
          <p style="text-align:left;font-size:1.05rem;line-height:1.65">${scene.content}</p>
          <button type="button" class="btn-continue" style="margin-top:1.5rem" data-next="${scene.nextScene}">Continuer</button>
        </div>`;
      document.querySelector(".btn-continue[data-next]").addEventListener("click", (e) => goToScene(e.target.dataset.next));
    }

    function renderEnding(scene) {
      document.getElementById("game-screen").innerHTML = `
        <div class="panel-center glass-panel" style="margin-top:2rem">
          <h2>${scene.title}</h2>
          <div style="margin-top:1rem">${scene.content}</div>
          <button type="button" class="btn-continue" style="margin-top:1.75rem" id="btn-restart-demo">Rejouer la démo</button>
        </div>`;
      document.getElementById("btn-restart-demo").addEventListener("click", () => {
        gameState = defaultState();
        localStorage.removeItem(STORAGE_KEYS.save);
        renderNotebook();
        refreshSkillBars();
        renderScene("intro_1");
      });
    }

    function bootstrapGame() {
      renderNotebook();
      refreshSkillBars();
      const raw = localStorage.getItem(STORAGE_KEYS.save);
      let loaded = false;
      if (raw) {
        try {
          const data = JSON.parse(raw);
          loaded = !!data.currentScene;
        } catch (e) { /* ignore */ }
      }
      if (loaded) loadGame();
      else renderScene(gameState.currentScene);
    }

    function initParticles() {
      const root = document.getElementById("particles");
      const n = 48;
      for (let i = 0; i < n; i++) {
        const p = document.createElement("span");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "%";
        p.style.top = Math.random() * 100 + "%";
        p.style.animationDelay = Math.random() * 5 + "s";
        p.style.animationDuration = 4 + Math.random() * 5 + "s";
        root.appendChild(p);
      }
    }

    function installOdysseeEmbedQuit() {
      try {
        if (new URLSearchParams(window.location.search).get("parentHud") === "1") return;
      } catch (e) { /* ignore */ }
      try {
        if (window.self === window.top) return;
      } catch (e) {
        return;
      }
      if (document.getElementById("odyssee-embed-quit-bar")) return;
      const bar = document.createElement("div");
      bar.id = "odyssee-embed-quit-bar";
      bar.className = "odyssee-embed-quit-bar";
      bar.innerHTML =
        "<button type=\"button\" class=\"odyssee-embed-quit-btn\" id=\"odyssee-embed-quit-btn\">Quitter le mode aventure</button>";
      document.body.insertBefore(bar, document.body.firstChild);
      document.getElementById("odyssee-embed-quit-btn").addEventListener("click", () => {
        try {
          window.parent.postMessage({ type: "odyssee-quit" }, window.location.origin);
        } catch (err) {
          try {
            window.parent.postMessage({ type: "odyssee-quit" }, "*");
          } catch (e2) { /* ignore */ }
        }
      });
    }

    const gameMenuApi = { close: () => {} };

    function wireGameMenu() {
      const menuLayer = document.getElementById("game-menu-layer");
      const notebookLayer = document.getElementById("notebook-layer");
      const btnMenu = document.getElementById("btn-game-menu");
      if (!menuLayer || !notebookLayer || !btnMenu) return;

      const closeGameMenu = () => {
        menuLayer.classList.remove("is-open");
        menuLayer.setAttribute("aria-hidden", "true");
        btnMenu.setAttribute("aria-expanded", "false");
      };
      gameMenuApi.close = closeGameMenu;
      const openGameMenu = () => {
        menuLayer.classList.add("is-open");
        menuLayer.setAttribute("aria-hidden", "false");
        btnMenu.setAttribute("aria-expanded", "true");
      };
      const closeNotebookModal = () => {
        notebookLayer.classList.remove("is-open");
        notebookLayer.setAttribute("aria-hidden", "true");
      };
      const openNotebookModal = () => {
        renderNotebook();
        notebookLayer.classList.add("is-open");
        notebookLayer.setAttribute("aria-hidden", "false");
      };

      btnMenu.addEventListener("click", () => openGameMenu());
      const scrimMenu = document.getElementById("game-menu-scrim");
      const dismissMenu = document.getElementById("btn-menu-dismiss");
      if (scrimMenu) scrimMenu.addEventListener("click", closeGameMenu);
      if (dismissMenu) dismissMenu.addEventListener("click", closeGameMenu);

      const btnNb = document.getElementById("btn-open-notebook");
      if (btnNb) {
        btnNb.addEventListener("click", () => {
          closeGameMenu();
          openNotebookModal();
        });
      }

      const scrimNb = document.getElementById("notebook-scrim");
      const dismissNb = document.getElementById("btn-notebook-dismiss");
      if (scrimNb) scrimNb.addEventListener("click", closeNotebookModal);
      if (dismissNb) dismissNb.addEventListener("click", closeNotebookModal);

      ["btn-save", "btn-load"].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("click", closeGameMenu);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (notebookLayer.classList.contains("is-open")) {
          closeNotebookModal();
          e.preventDefault();
          return;
        }
        if (menuLayer.classList.contains("is-open")) {
          closeGameMenu();
          e.preventDefault();
        }
      });
    }

    function wireHeader() {
      document.getElementById("btn-save").addEventListener("click", saveGame);
      document.getElementById("btn-load").addEventListener("click", () => loadGame());
      document.getElementById("btn-new").addEventListener("click", () => {
        if (confirm("Recommencer une nouvelle partie ? La progression sauvegardée sera réinitialisée.")) {
          gameState = defaultState();
          localStorage.removeItem(STORAGE_KEYS.save);
          renderNotebook();
          refreshSkillBars();
          renderScene("intro_1");
          gameMenuApi.close();
        }
      });
    }

    /** Point d'entrée : particules, en-tête, puis sauvegarde ou scène par défaut. */
    function init() {
      installOdysseeEmbedQuit();
      initParticles();
      wireGameMenu();
      wireHeader();
      bootstrapGame();
    }

    // Exposer pour onclick inline si besoin d'extension future
    window.gameData = gameData;
    window.renderScene = renderScene;

    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
    else init();
  </script>
</body>
</html>
