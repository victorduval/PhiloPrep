function showHome(){
document.getElementById('hub-home').style.display='';
var a=document.getElementById('hub-fiche-host');if(a)a.classList.remove('active');
var b=document.getElementById('hub-game-host');if(b)b.classList.remove('active');
}
function showFiche(){
document.getElementById('hub-home').style.display='none';
document.getElementById('hub-game-host').classList.remove('active');
document.getElementById('hub-fiche-host').classList.add('active');
var ifr=document.getElementById('if-fiche');
if(!ifr.getAttribute('data-ready')){ifr.srcdoc=FICHE_HTML;ifr.setAttribute('data-ready','1');}
}
function showGame(){
document.getElementById('hub-home').style.display='none';
document.getElementById('hub-fiche-host').classList.remove('active');
document.getElementById('hub-game-host').classList.add('active');
var ifr=document.getElementById('if-game');
if(!ifr.getAttribute('data-ready')){ifr.srcdoc=GAME_HTML;ifr.setAttribute('data-ready','1');}
}
document.getElementById('btn-fiche').addEventListener('click',showFiche);
document.getElementById('btn-game').addEventListener('click',showGame);
window.showHubHome=showHome;
})();</script>
