[build]
  publish = "public"
  functions = "netlify/functions"

# Délai max pour l’appel Anthropic (plafond selon formule Netlify ; évite 504 sur réponses longues).
[functions.anthropic]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
