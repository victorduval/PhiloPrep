function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickForQuiz(pool, count) {
  const shuffled = shuffleArray(pool);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

function QuizApp() {
  const [screen, setScreen] = useState('format');
  const [format, setFormat] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [userAnswers, setUserAnswers] = useState([]);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);

  const startQuiz = (count) => {
    setFormat(count);
    setQuestions(pickForQuiz(QUESTIONS, count));
    setCurrentIndex(0);
    setUserAnswers([]);
    setSelectedAnswer(null);
    setShowFeedback(false);
    setScreen('quiz');
  };

  const handleAnswer = () => {
    if (selectedAnswer === null) return;
    
    const current = questions[currentIndex];
    const isCorrect = current.type === 'vrai-faux' 
      ? selectedAnswer === current.correct
      : selectedAnswer === current.correct;

    setUserAnswers([...userAnswers, { question: current, answer: selectedAnswer, correct: isCorrect }]);
    setShowFeedback(true);
  };

  const nextQuestion = () => {
    if (currentIndex < questions.length - 1) {
      setCurrentIndex(currentIndex + 1);
      setSelectedAnswer(null);
      setShowFeedback(false);
    } else {
      setScreen('results');
    }
  };

  const restart = () => {
    setScreen('format');
    setFormat(null);
    setQuestions([]);
    setCurrentIndex(0);
    setUserAnswers([]);
    setSelectedAnswer(null);
    setShowFeedback(false);
  };

  const current = questions[currentIndex];
  const currentColor = current ? COLORS[currentIndex % COLORS.length] : COLORS[0];

  const score = userAnswers.length > 0 ? Math.round((correctCount / userAnswers.length) * 100) : 0;

    <div style={{maxWidth:'500px',margin:'0 auto'}}>
      
      {screen === 'format' && (

          <div style={{fontSize:'26px',fontWeight:300,color:'rgba(255,255,255,0.95)',fontFamily:'Georgia,serif',marginBottom:'0.5rem'}}>L'Art</div>
          <div style={{fontSize:'15px',color:'rgba(255,255,255,0.7)',marginBottom:'2.5rem'}}>Choisissez la durée du test</div>
          
          {[
            {count:10,label:'Format court',time:'~5 minutes',color:'#d4a820'},
            {count:20,label:'Format intermédiaire',time:'~10 minutes',color:'#c97800'},
            {count:30,label:'Format long',time:'~15 minutes',color:'#1e6b6b'}
          ].map(({count,label,time,color}) => (
            <div key={count} onClick={() => startQuiz(count)} style={{background:'rgba(255,255,255,0.1)',backdropFilter:'blur(20px)',border:`2px solid ${color}`,borderRadius:'18px',padding:'1.4rem 1.6rem',cursor:'pointer',marginBottom:'16px',display:'flex',alignItems:'center',gap:'18px',transition:'all 0.2s',boxShadow:`0 4px 20px ${color}30`}}>
              <div style={{width:52,height:52,background:`${color}30`,border:`2px solid ${color}`,borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div style={{flex:1,textAlign:'left'}}>
                <div style={{fontSize:'18px',fontWeight:600,color,marginBottom:'5px'}}>{label}</div>
                <div style={{fontSize:'14px',color:'rgba(255,255,255,0.7)'}}>{count} questions · {time}</div>
              </div>
              <div style={{color,fontSize:'22px',fontWeight:300}}>→</div>
            </div>
          ))}
        </div>
      )}

        <div style={{paddingTop:'2rem'}}>
          <div style={{textAlign:'center',marginBottom:'2rem'}}>
            <div style={{fontSize:'14px',color:'rgba(255,255,255,0.65)',marginBottom:'0.7rem'}}>Question {currentIndex + 1} / {format}</div>

              <div style={{width:`${((currentIndex + 1) / format) * 100}%`,height:'100%',background:currentColor.main,borderRadius:'3px',transition:'width 0.3s'}}/>
            </div>
          </div>

          <div style={{background:'rgba(255,255,255,0.1)',backdropFilter:'blur(24px)',border:`2px solid ${currentColor.main}`,borderRadius:'20px',padding:'1.8rem',boxShadow:`0 8px 32px ${currentColor.main}40`}}>
            <div style={{marginBottom:'1.8rem'}}>
              {current.citation && <div style={{background:currentColor.bg,borderLeft:`4px solid ${currentColor.main}`,padding:'1.2rem',borderRadius:'10px',fontStyle:'italic',color:'rgba(255,255,255,0.95)',marginBottom:'1.2rem',fontSize:'15.5px',lineHeight:1.6}}>« {current.citation} »</div>}

            </div>

            <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
              {current.type === 'vrai-faux' ? (
                <>
                  <button onClick={() => setSelectedAnswer(true)} style={{background:selectedAnswer === true ? currentColor.bg : 'rgba(255,255,255,0.08)',border:selectedAnswer === true ? `2px solid ${currentColor.main}` : '2px solid rgba(255,255,255,0.2)',borderRadius:'14px',padding:'16px',color:selectedAnswer === true ? currentColor.text : 'rgba(255,255,255,0.9)',fontSize:'16px',fontWeight:selectedAnswer === true ? 600 : 500,cursor:'pointer',textAlign:'left',transition:'all 0.2s'}}>Vrai</button>

                </>

                current.options.map((opt, idx) => (
                  <button key={idx} onClick={() => setSelectedAnswer(idx)} style={{background:selectedAnswer === idx ? currentColor.bg : 'rgba(255,255,255,0.08)',border:selectedAnswer === idx ? `2px solid ${currentColor.main}` : '2px solid rgba(255,255,255,0.2)',borderRadius:'14px',padding:'16px',color:selectedAnswer === idx ? currentColor.text : 'rgba(255,255,255,0.9)',fontSize:'16px',fontWeight:selectedAnswer === idx ? 600 : 500,cursor:'pointer',textAlign:'left',transition:'all 0.2s'}}>{opt}</button>
                ))
              )}
            </div>

            <div style={{marginTop:'2rem',textAlign:'center'}}>
              <button onClick={handleAnswer} disabled={selectedAnswer === null} style={{background:selectedAnswer !== null ? currentColor.bg : 'rgba(255,255,255,0.08)',border:selectedAnswer !== null ? `2px solid ${currentColor.main}` : '2px solid rgba(255,255,255,0.2)',borderRadius:'14px',padding:'14px 40px',color:selectedAnswer !== null ? currentColor.text : 'rgba(255,255,255,0.5)',fontSize:'16px',fontWeight:600,cursor:selectedAnswer !== null ? 'pointer' : 'default',opacity:selectedAnswer !== null ? 1 : 0.5}}>Valider</button>
            </div>
          </div>
        </div>
      )}

      {screen === 'quiz' && current && showFeedback && (
        <div style={{paddingTop:'2rem'}}>
          <div style={{textAlign:'center',marginBottom:'2rem'}}>
            <div style={{fontSize:'14px',color:'rgba(255,255,255,0.65)',marginBottom:'0.7rem'}}>Question {currentIndex + 1} / {format}</div>
            <div style={{width:'100%',height:'4px',background:'rgba(255,255,255,0.15)',borderRadius:'3px',maxWidth:'420px',margin:'0 auto'}}>

            </div>
          </div>

            <div style={{textAlign:'center',marginBottom:'1.8rem'}}>
              <div style={{width:64,height:64,background:userAnswers[userAnswers.length-1].correct?'rgba(52,211,153,0.2)':'rgba(248,113,113,0.2)',border:userAnswers[userAnswers.length-1].correct?'3px solid #34D399':'3px solid #F87171',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1.2rem'}}>
                {userAnswers[userAnswers.length-1].correct ? (
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#34D399" strokeWidth="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                ) : (
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F87171" strokeWidth="3.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                )}
              </div>
              <div style={{fontSize:'20px',fontWeight:600,color:userAnswers[userAnswers.length-1].correct?'#6EE7B7':'#FCA5A5'}}>{userAnswers[userAnswers.length-1].correct?'Correct !':'Incorrect'}</div>
            </div>

            <div style={{background:userAnswers[userAnswers.length-1].correct?'rgba(52,211,153,0.15)':'rgba(248,113,113,0.15)',border:userAnswers[userAnswers.length-1].correct?'2px solid rgba(52,211,153,0.4)':'2px solid rgba(248,113,113,0.4)',borderRadius:'14px',padding:'1.3rem',marginBottom:'1.2rem'}}>
              <div style={{fontSize:'15px',color:'rgba(255,255,255,0.95)',lineHeight:1.7}}>{current.explanation}</div>
            </div>

            {current.details && (
              <div style={{background:'rgba(255,255,255,0.08)',border:'2px solid rgba(255,255,255,0.2)',borderRadius:'14px',padding:'1.3rem',marginBottom:'1.5rem'}}>
                <div style={{fontSize:'12px',color:'rgba(255,255,255,0.7)',marginBottom:'0.7rem',textTransform:'uppercase',letterSpacing:'0.8px',fontWeight:600}}>Pour aller plus loin</div>
                <div style={{fontSize:'14.5px',color:'rgba(255,255,255,0.9)',lineHeight:1.7}}>{current.details}</div>
              </div>
            )}

            <div style={{textAlign:'center'}}>
              <button onClick={nextQuestion} style={{background:currentColor.bg,border:`2px solid ${currentColor.main}`,borderRadius:'14px',padding:'14px 40px',color:currentColor.text,fontSize:'16px',fontWeight:600,cursor:'pointer'}}>
                {currentIndex < questions.length - 1 ? 'Question suivante →' : 'Voir les résultats'}
              </button>
            </div>
          </div>
        </div>
      )}

      {screen === 'results' && (
        <div style={{paddingTop:'2rem'}}>
          <div style={{background:'rgba(255,255,255,0.1)',backdropFilter:'blur(24px)',border:'2px solid #d4a820',borderRadius:'20px',padding:'2rem',boxShadow:'0 8px 32px rgba(212,168,32,0.4)'}}>
            <div style={{textAlign:'center',marginBottom:'2.5rem'}}>
              <div style={{width:90,height:90,background:'rgba(212,168,32,0.2)',border:'3px solid #d4a820',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1.5rem'}}>
                <div style={{fontSize:'32px',fontWeight:600,color:'#fffbea'}}>{correctCount}/{userAnswers.length}</div>
              </div>
              <div style={{fontSize:'22px',fontWeight:600,color:'rgba(255,255,255,0.98)',marginBottom:'0.6rem'}}>
                {score >= 80 ? 'Excellent travail !' : score >= 60 ? 'Bien joué !' : 'Continue tes efforts !'}
              </div>
              <div style={{fontSize:'15px',color:'rgba(255,255,255,0.75)'}}>
                {score >= 80 ? 'Tu maîtrises bien les notions clés' : score >= 60 ? 'Bonne compréhension générale' : 'Revois le cours'}
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'14px',marginBottom:'2rem'}}>
              <div style={{background:'rgba(52,211,153,0.15)',border:'2px solid rgba(52,211,153,0.5)',borderRadius:'14px',padding:'1.2rem',textAlign:'center'}}>
                <div style={{fontSize:'26px',fontWeight:600,color:'#6EE7B7',marginBottom:'6px'}}>{correctCount}</div>
                <div style={{fontSize:'12px',color:'rgba(255,255,255,0.75)',fontWeight:500}}>Correctes</div>
              </div>
              <div style={{background:'rgba(248,113,113,0.15)',border:'2px solid rgba(248,113,113,0.5)',borderRadius:'14px',padding:'1.2rem',textAlign:'center'}}>
                <div style={{fontSize:'26px',fontWeight:600,color:'#FCA5A5',marginBottom:'6px'}}>{userAnswers.length - correctCount}</div>
                <div style={{fontSize:'12px',color:'rgba(255,255,255,0.75)',fontWeight:500}}>Incorrectes</div>
              </div>
              <div style={{background:'rgba(251,191,36,0.15)',border:'2px solid rgba(251,191,36,0.5)',borderRadius:'14px',padding:'1.2rem',textAlign:'center'}}>
                <div style={{fontSize:'26px',fontWeight:600,color:'#FCD34D',marginBottom:'6px'}}>{score}%</div>
                <div style={{fontSize:'12px',color:'rgba(255,255,255,0.75)',fontWeight:500}}>Score</div>
              </div>
            </div>

            {userAnswers.filter(a => !a.correct).length > 0 && (
              <div style={{background:'rgba(255,255,255,0.08)',border:'2px solid rgba(255,255,255,0.2)',borderRadius:'14px',padding:'1.3rem',marginBottom:'1.5rem'}}>
                <div style={{fontSize:'13px',color:'rgba(255,255,255,0.7)',marginBottom:'0.8rem',fontWeight:600}}>Points à revoir</div>
                <div style={{fontSize:'14.5px',color:'rgba(255,255,255,0.9)',lineHeight:1.7}}>
                  {userAnswers.filter(a => !a.correct).slice(0,3).map((a,i) => (
                    <div key={i} style={{marginBottom:'6px'}}>• {a.question.question.substring(0,70)}...</div>
                  ))}
                </div>
              </div>
            )}

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <button style={{background:'rgba(255,255,255,0.1)',border:'2px solid rgba(255,255,255,0.3)',borderRadius:'14px',padding:'14px',color:'rgba(255,255,255,0.9)',fontSize:'15px',fontWeight:600,cursor:'pointer'}}>Revoir le cours</button>
              <button onClick={restart} style={{background:'rgba(212,168,32,0.2)',border:'2px solid #d4a820',borderRadius:'14px',padding:'14px',color:'#fffbea',fontSize:'15px',fontWeight:600,cursor:'pointer'}}>Recommencer</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.render(<QuizApp />, document.getElementById('root'));
</script>
