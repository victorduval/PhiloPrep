    const LEGACY_SCENE_IDS = {
      aporie_conclusion: "aporie_conclusion_finale",
      transition_platon: "platon_herite",
      protagoras_intro: "sophistes_intro"
    };

    function resolveSceneId(id) {
      if (!id || typeof id !== "string") return id;
      return LEGACY_SCENE_IDS[id] || id;
    }

    function getSceneById(id) {
      const resolved = resolveSceneId(id);
      return gameData.scenes.find((s) => s.id === resolved);
    }

    function getBackgroundStyle(key) {
      const k = BACKGROUND_KEY_ALIASES[key] || key;
      return BACKGROUNDS[key] || BACKGROUNDS[k] || "linear-gradient(180deg, #1a1f3a, #0a0e27)";
    }

    /**
     * Arrière-plan dialogue : image locale (jpg → repli svg) + voile lisible,
     * ou uniquement le dégradé CSS si aucun fichier n'est défini pour cette clé.
     */
    function buildSceneBackgroundHtml(sceneBackgroundKey) {
      const mapKey = BACKGROUND_KEY_ALIASES[sceneBackgroundKey] || sceneBackgroundKey;
      const jpgTarget = IMAGE_PATHS.backgrounds[mapKey];
      const grad = getBackgroundStyle(sceneBackgroundKey);
      if (!jpgTarget) {
        return `<div class="scene-bg-gradient" style="background:${grad}"></div>`;
      }
      const src = resolveFromJpgTarget(jpgTarget);
      const svg = svgFallbackForPath(jpgTarget);
      const isJpg = /\.jpe?g$/i.test(src);
      const url = assetUrl(src);
      const svgUrl = assetUrl(svg);
      const oe = isJpg ? ` onerror="this.onerror=null;this.src='${escapeAttrSingle(svgUrl)}'"` : "";
      return `<img class="scene-bg-img" src="${url}" alt="" decoding="async"${oe} /><div class="scene-bg-gradient"></div>`;
    }

    /** Portrait : voir getImagePath('portraits', clé) — .jpg réels ou .svg placeholder. */
    function buildPortraitImgHtml(philosopherKey, altText) {
      const jpgTarget = IMAGE_PATHS.portraits[philosopherKey];
      if (!jpgTarget) {
        const svg = "data:image/svg+xml," + encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533"><rect fill="#2a2f4a" width="100%" height="100%"/><text x="50%" y="50%" fill="#D4AF37" font-family="serif" font-size="18" text-anchor="middle">Portrait</text></svg>`
        );
        return `<img class="portrait-img" src="${svg}" alt="${altText || ""}" loading="lazy" width="220" height="294" />`;
      }
      const src = resolveFromJpgTarget(jpgTarget);
      const svg = svgFallbackForPath(jpgTarget);
      const isJpg = /\.jpe?g$/i.test(src);
      const url = assetUrl(src);
      const svgUrl = assetUrl(svg);
      const oe = isJpg ? ` onerror="this.onerror=null;this.src='${escapeAttrSingle(svgUrl)}'"` : "";
      return `<img class="portrait-img" src="${url}" alt="${altText || ""}" loading="lazy" width="220" height="294"${oe} />`;
    }

    let narrativeSequenceTimer = null;
    function clearNarrativeSequenceTimer() {
      if (narrativeSequenceTimer) {
        clearTimeout(narrativeSequenceTimer);
        narrativeSequenceTimer = null;
      }
    }

    function renderNarrativeSequence(scene) {
      clearNarrativeSequenceTimer();
      const screen = document.getElementById("game-screen");
      const slides = scene.images || [];
      let index = 0;
      const r = gameState.resume && gameState.resume.narrative;
      if (r && r.sceneId === scene.id && slides.length > 0 && typeof r.slideIndex === "number") {
        index = Math.max(0, Math.min(r.slideIndex, slides.length - 1));
      }

      function finishSequence() {
        clearNarrativeSequenceTimer();
        if (gameState.resume && gameState.resume.narrative && gameState.resume.narrative.sceneId === scene.id) {
          gameState.resume = null;
        }
        goToScene(scene.nextScene);
      }

      function showSlide() {
        if (index >= slides.length) {
          finishSequence();
          return;
        }
        gameState.resume = { narrative: { sceneId: scene.id, slideIndex: index } };
        saveGame();
        const step = slides[index];
        const relSrc = resolveFromJpgTarget(step.path);
        const svg = svgFallbackForPath(step.path);
        const isJpg = /\.jpe?g$/i.test(relSrc);
        const imgUrl = assetUrl(relSrc);
        const svgUrl = assetUrl(svg);
        const oe = isJpg ? ` onerror="this.onerror=null;this.src='${escapeAttrSingle(svgUrl)}'"` : "";

        const sub = scene.subtitle
          ? `<div class="narrative-subtitle">${escapeHtml(scene.subtitle)}</div>`
          : "";
        const stepTitle = step.title
          ? `<h3 class="narrative-step-title">${escapeHtml(step.title)}</h3>`
          : "";
        const altImg = escapeHtml(step.title || "Illustration — " + (index + 1));

        const atLast = index >= slides.length - 1;
        screen.innerHTML = `
          <div class="narrative-sequence fade-in">
            <button type="button" class="nav-arrow nav-arrow--prev" id="narrative-prev"${index <= 0 ? " disabled" : ""} aria-label="Précédent">‹</button>
            <button type="button" class="nav-arrow nav-arrow--next" id="narrative-next" aria-label="${atLast ? "Terminer" : "Suivant"}">›</button>
            <div class="narrative-sequence-header">
              <h2 class="narrative-title">${escapeHtml(scene.title)}</h2>
              ${sub}
              ${stepTitle}
            </div>
            <div class="narrative-body">
              <div class="narrative-image-container">
                <img class="narrative-image" src="${imgUrl}" alt="${altImg}" decoding="async"${oe} />
              </div>
              <div class="narrative-text"><div class="narrative-text-inner">${step.text}</div></div>
            </div>
            <div class="narrative-footer">
              <span class="narrative-progress">${index + 1} / ${slides.length}</span>
              <button type="button" class="btn-ghost narrative-skip" id="narrative-skip">Passer</button>
            </div>
          </div>`;

        document.getElementById("narrative-prev").addEventListener("click", () => {
          if (index <= 0) return;
          index--;
          showSlide();
        });
        document.getElementById("narrative-next").addEventListener("click", () => {
          if (atLast) {
            finishSequence();
            return;
          }
          index++;
          showSlide();
        });
        document.getElementById("narrative-skip").addEventListener("click", () => {
          clearNarrativeSequenceTimer();
          finishSequence();
        });
      }

      showSlide();
    }

    /**
     * Rendu principal : route selon scene.type.
     * Pour ajouter un type : étendre ce switch + miniGameEngines ou un nouveau renderer.
     */
    function renderScene(sceneId) {
      clearNarrativeSequenceTimer();
      const resolved = resolveSceneId(sceneId);
      const scene = getSceneById(resolved);
      if (!scene) {
        document.getElementById("game-screen").innerHTML = "<p style='padding:2rem'>Scène introuvable.</p>";
        return;
      }
      gameState.currentScene = resolved;
      if (scene.type !== "narrative_sequence" && gameState.resume && gameState.resume.narrative) {
        gameState.resume = null;
      }

      if (scene.type === "dialogue") renderDialogue(scene);
      else if (scene.type === "minigame") {
        const engine = miniGameEngines[scene.gameType];
        if (engine && engine.render) engine.render(scene);
        else document.getElementById("game-screen").innerHTML = "<p style='padding:2rem'>Mini-jeu non implémenté.</p>";
      } else if (scene.type === "transition") renderTransition(scene);
      else if (scene.type === "narrative_sequence") renderNarrativeSequence(scene);
      else if (scene.type === "ending") renderEnding(scene);
      else document.getElementById("game-screen").innerHTML = "<p style='padding:2rem'>Type de scène inconnu.</p>";

      if (scene.type !== "narrative_sequence" && scene.unlocksNotions) addNotionsToNotebook(scene.unlocksNotions);
      saveGame();
    }

    const DIALOGUE_SPEAKER_LABELS = {
      protagoras: "Protagoras",
      gorgias: "Gorgias",
      citoyen: "Citoyen",
      accusateur: "Accusateur"
    };

    function renderDialogueLineHtml(line, scene, ph) {
      const isNarration = line.speaker === "narration";
      let speakerLabel = "Narration";
      if (!isNarration) {
        if (DIALOGUE_SPEAKER_LABELS[line.speaker]) speakerLabel = DIALOGUE_SPEAKER_LABELS[line.speaker];
        else if (ph && line.speaker === scene.philosopher) speakerLabel = ph.name;
        else speakerLabel = line.speaker.charAt(0).toUpperCase() + line.speaker.slice(1);
      }
      const cls = isNarration ? "dialogue-line speaker-narration" : "dialogue-line";
      const tag = isNarration ? "" : `<div class="speaker-tag">${speakerLabel}</div>`;
      return `<div class="${cls}" style="animation-delay:0.08s">${tag}<div>${line.text}</div></div>`;
    }

    function renderDialogue(scene) {
      const ph = gameData.philosophers[scene.philosopher];
      const dialogues = scene.dialogues || [];
      const choices = scene.choices || [];
      const continueOnly = scene.action === "continue" && choices.length === 0;

      if (scene.dialoguePaging === false) {
        const lines = dialogues.map((line, idx) => {
          const isNarration = line.speaker === "narration";
          const speakerLabel = isNarration ? "Narration" : (ph && line.speaker === scene.philosopher ? ph.name : line.speaker);
          const cls = isNarration ? "dialogue-line speaker-narration" : "dialogue-line";
          const tag = isNarration ? "" : `<div class="speaker-tag">${speakerLabel}</div>`;
          return `<div class="${cls}" style="animation-delay:${0.05 + idx * 0.08}s">${tag}<div>${line.text}</div></div>`;
        }).join("");

        let choicesHtml = "";
        if (choices.length) {
          choicesHtml = `<div class="choices">${choices.map((c, i) =>
            `<button type="button" class="choice-btn" data-scene="${scene.id}" data-index="${i}">${c.text}</button>`
          ).join("")}</div>`;
        } else if (continueOnly) {
          choicesHtml = `<button type="button" class="btn-continue" data-next="${scene.nextScene}">Continuer</button>`;
        }

        const bgInner = buildSceneBackgroundHtml(scene.background || "athens_agora");
        const portraitImg = buildPortraitImgHtml(scene.philosopher, ph ? ph.name : "");

        document.getElementById("game-screen").innerHTML = `
          <div class="dialogue-scene fade-in">
            <div class="scene-background">${bgInner}</div>
            <div class="character-portrait">
              <div class="portrait-frame">
                ${portraitImg}
              </div>
              <div class="character-name">${ph ? ph.name : ""}</div>
              <div class="character-title">${ph ? ph.title : ""}</div>
            </div>
            <div class="dialogue-box">
              <div class="dialogue-text">${lines}</div>
              ${choicesHtml}
            </div>
          </div>`;

        document.querySelectorAll(".choice-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const idx = parseInt(btn.dataset.index, 10);
            selectChoice(scene.id, idx);
          });
        });
        const cont = document.querySelector(".btn-continue[data-next]");
        if (cont) cont.addEventListener("click", () => goToScene(cont.dataset.next));
        return;
      }

      const choicePageIndex = choices.length > 0 ? dialogues.length : -1;
      const multiStep = dialogues.length + (choices.length ? 1 : 0) > 1;
      let page = 0;

      function mountDialoguePage() {
        const isChoicePage = choicePageIndex >= 0 && page === choicePageIndex;
        const line = !isChoicePage && page < dialogues.length ? dialogues[page] : null;
        const isNarration = line && line.speaker === "narration";
        const sceneClass = `dialogue-scene fade-in dialogue-scene--paged${isNarration ? " narration-page" : ""}`;

        let linesHtml = "";
        if (line) {
          linesHtml = `<div class="dialogue-text">${renderDialogueLineHtml(line, scene, ph)}</div>`;
        }

        let choicesHtml = "";
        if (isChoicePage && choices.length) {
          choicesHtml = `<div class="choices">${choices.map((c, i) =>
            `<button type="button" class="choice-btn" data-scene="${scene.id}" data-index="${i}">${c.text}</button>`
          ).join("")}</div>`;
        }

        const atLastDialogue = !isChoicePage && dialogues.length > 0 && page === dialogues.length - 1;
        const prevDisabled = multiStep && page === 0 && !isChoicePage;
        const showPrevArrow = multiStep;

        let showNextArrow = false;
        let nextIsContinue = false;
        if (!isChoicePage) {
          if (atLastDialogue && continueOnly) {
            showNextArrow = true;
            nextIsContinue = true;
          } else if (atLastDialogue && choices.length) {
            showNextArrow = true;
          } else if (dialogues.length > 0 && page < dialogues.length - 1) {
            showNextArrow = true;
          }
        }
        if (!multiStep && continueOnly) {
          showNextArrow = true;
          nextIsContinue = true;
        }

        const nextSceneId = scene.nextScene ? String(scene.nextScene) : "";
        const prevArrowHtml = showPrevArrow
          ? `<button type="button" class="nav-arrow nav-arrow--prev dialogue-step-prev"${prevDisabled ? " disabled" : ""} aria-label="Précédent">‹</button>`
          : "";
        const nextArrowHtml = showNextArrow
          ? (nextIsContinue && nextSceneId
              ? `<button type="button" class="nav-arrow nav-arrow--next dialogue-step-continue" data-next="${escapeHtml(nextSceneId)}" aria-label="Continuer">›</button>`
              : `<button type="button" class="nav-arrow nav-arrow--next dialogue-step-next" aria-label="Suivant">›</button>`)
          : "";

        const bgInner = buildSceneBackgroundHtml(scene.background || "athens_agora");
        const portraitImg = buildPortraitImgHtml(scene.philosopher, ph ? ph.name : "");

        document.getElementById("game-screen").innerHTML = `
          <div class="${sceneClass}">
            <div class="scene-background">${bgInner}</div>
            ${prevArrowHtml}
            ${nextArrowHtml}
            <div class="character-portrait">
              <div class="portrait-frame">
                ${portraitImg}
              </div>
              <div class="character-name">${ph ? ph.name : ""}</div>
              <div class="character-title">${ph ? ph.title : ""}</div>
            </div>
            <div class="dialogue-main">
              <div class="dialogue-box">
                ${linesHtml}
                ${choicesHtml}
              </div>
            </div>
          </div>`;

        document.querySelectorAll(".choice-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const idx = parseInt(btn.dataset.index, 10);
            selectChoice(scene.id, idx);
          });
        });

        const prevBtn = document.querySelector(".dialogue-step-prev");
        if (prevBtn && !prevBtn.disabled) {
          prevBtn.addEventListener("click", () => {
            page -= 1;
            mountDialoguePage();
          });
        }

        const nextBtn = document.querySelector(".dialogue-step-next");
        if (nextBtn) {
          nextBtn.addEventListener("click", () => {
            page += 1;
            mountDialoguePage();
          });
        }

        document.querySelectorAll(".dialogue-step-continue[data-next]").forEach((btn) => {
          btn.addEventListener("click", () => goToScene(btn.dataset.next));
        });
      }

      mountDialoguePage();
    }

    function selectChoice(sceneId, choiceIndex) {
      const scene = getSceneById(sceneId);
      const ch = scene.choices[choiceIndex];
      // Si `correct` est explicitement false, on considère que c'est une mauvaise réponse.
      // Sinon (y compris si `correct` est omis), on laisse la scène avancer.
      if (ch.correct === false) {
        const box = document.querySelector(".dialogue-box");
        const body =
          ch.wrongExplanation ||
          (ch.feedback ? `<p>${ch.feedback}</p>` : "<p>Ce n'est pas la réponse attendue. Choisis une autre option.</p>");
        if (box) {
          showWrongAttemptPanel(box, {
            title: "Pas tout à fait",
            bodyHtml: body
          });
        }
        return;
      }
      if (ch.skillGain) Object.keys(ch.skillGain).forEach((k) => updateSkill(k, ch.skillGain[k]));
      if (ch.feedback) showToast(ch.feedback);
      setTimeout(() => goToScene(ch.nextScene), ch.feedback ? 1800 : 400);
    }

    function goToScene(nextId) {
      const resolved = resolveSceneId(nextId);
      const next = getSceneById(resolved);
      if (next && next.unlocksNotions) addNotionsToNotebook(next.unlocksNotions);
      gameState.currentScene = resolved;
      saveGame();
      renderScene(resolved);
    }

    function renderTransition(scene) {
      const bgHtml = buildSceneBackgroundHtml("athens_agora");
      const screen = document.getElementById("game-screen");
      const titleEsc = escapeHtml(scene.title);
      const chunks = splitTransitionContentToPages(scene.content);
      const nextRaw = scene.nextScene ? String(scene.nextScene) : "";

      function bindContinue(root) {
        const b = root.querySelector(".btn-continue[data-next]");
        if (b) b.addEventListener("click", (e) => goToScene(e.target.dataset.next));
      }

      if (!isMobileGameViewport() || chunks.length <= 1) {
        screen.innerHTML = `
        <div class="scene-background" style="position:absolute;inset:0">${bgHtml}</div>
        <div class="panel-center glass-panel transition-screen transition-screen--wide" style="position:relative;margin-top:10vh">
          <h2>${titleEsc}</h2>
          <p style="text-align:left;font-size:1.05rem;line-height:1.65">${scene.content}</p>
          <button type="button" class="btn-continue" style="margin-top:1.5rem" data-next="${escapeHtml(nextRaw)}">Continuer</button>
        </div>`;
        bindContinue(screen);
        return;
      }

      let pageIdx = 0;
      function paintTransition() {
        const last = pageIdx >= chunks.length - 1;
        screen.innerHTML = `
        <div class="scene-background" style="position:absolute;inset:0">${bgHtml}</div>
        <div class="transition-screen glass-panel">
          <h2>${titleEsc}</h2>
          <div class="minigame-tab-panels">
            ${chunks
              .map(
                (html, i) =>
                  `<div class="minigame-page transition-page"${i === pageIdx ? "" : " hidden"}>${html}</div>`
              )
              .join("")}
          </div>
          <div class="minigame-pager-controls">
            <button type="button" class="btn-ghost tr-pager-prev" aria-label="Précédent"${pageIdx <= 0 ? " disabled" : ""}>‹</button>
            <span class="minigame-page-indicator tr-pager-ind">${pageIdx + 1} / ${chunks.length}</span>
            <button type="button" class="btn-ghost tr-pager-next" aria-label="Suivant"${last ? " hidden" : ""}>›</button>
          </div>
          <button type="button" class="btn-continue tr-pager-done" data-next="${escapeHtml(nextRaw)}"${last ? "" : " hidden"}>Continuer</button>
        </div>`;
        const prev = screen.querySelector(".tr-pager-prev");
        const next = screen.querySelector(".tr-pager-next");
        const done = screen.querySelector(".tr-pager-done");
        if (prev) {
          prev.addEventListener("click", () => {
            if (pageIdx > 0) {
              pageIdx--;
              paintTransition();
            }
          });
        }
        if (next) {
          next.addEventListener("click", () => {
            if (pageIdx < chunks.length - 1) {
              pageIdx++;
              paintTransition();
            }
          });
        }
        bindContinue(screen);
      }
      paintTransition();
    }

    function renderEnding(scene) {
      const screen = document.getElementById("game-screen");
      const titleEsc = escapeHtml(scene.title);
      const chunks = splitTransitionContentToPages(scene.content);

      function bindRestart(root) {
        const b = root.querySelector("#btn-restart-demo");
        if (b) {
          b.addEventListener("click", () => {
            gameState = defaultState();
            clearAllSaveSlots();
            renderNotebook();
            refreshSkillBars();
            renderScene("intro_1");
          });
        }
      }

      if (!isMobileGameViewport() || chunks.length <= 1) {
        screen.innerHTML = `
        <div class="panel-center glass-panel ending-screen" style="margin-top:2rem">
          <h2>${titleEsc}</h2>
          <div style="margin-top:1rem">${scene.content}</div>
          <button type="button" class="btn-continue" style="margin-top:1.75rem" id="btn-restart-demo">Rejouer la démo</button>
        </div>`;
        bindRestart(screen);
        return;
      }

      let pageIdx = 0;
      function paintEnding() {
        const last = pageIdx >= chunks.length - 1;
        screen.innerHTML = `
        <div class="ending-screen-wrap glass-panel">
          <h2>${titleEsc}</h2>
          <div class="minigame-tab-panels">
            ${chunks
              .map(
                (html, i) =>
                  `<div class="minigame-page ending-page"${i === pageIdx ? "" : " hidden"}>${html}</div>`
              )
              .join("")}
          </div>
          <div class="minigame-pager-controls">
            <button type="button" class="btn-ghost end-pager-prev"${pageIdx <= 0 ? " disabled" : ""}>‹</button>
            <span class="minigame-page-indicator">${pageIdx + 1} / ${chunks.length}</span>
            <button type="button" class="btn-ghost end-pager-next"${last ? " hidden" : ""}>›</button>
          </div>
          <button type="button" class="btn-continue" style="margin-top:0.65rem" id="btn-restart-demo"${last ? "" : " hidden"}>Rejouer la démo</button>
        </div>`;
        screen.querySelector(".end-pager-prev")?.addEventListener("click", () => {
          if (pageIdx > 0) {
            pageIdx--;
            paintEnding();
          }
        });
        screen.querySelector(".end-pager-next")?.addEventListener("click", () => {
          if (pageIdx < chunks.length - 1) {
            pageIdx++;
            paintEnding();
          }
        });
        bindRestart(screen);
      }
      paintEnding();
    }

    function bootstrapGame() {
      renderNotebook();
      refreshSkillBars();
      const entry = readSaveRaw();
      if (!entry) {
        renderScene(gameState.currentScene);
        return;
      }
      try {
        const data = JSON.parse(entry.raw);
        const sid = resolveSceneId(data.currentScene);
        if (!sid || !getSceneById(sid)) {
          renderScene(gameState.currentScene);
          return;
        }
        data.currentScene = sid;
        migrateSaveToPrimaryIfNeeded(entry.key, entry.raw);
        applySaveData(data);
        renderScene(gameState.currentScene);
      } catch (e) {
        renderScene(gameState.currentScene);
      }
    }

    function initParticles() {
      const root = document.getElementById("particles");
      const n = 48;
      for (let i = 0; i < n; i++) {
        const p = document.createElement("span");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "%";
        p.style.top = Math.random() * 100 + "%";
        p.style.animationDelay = Math.random() * 5 + "s";
        p.style.animationDuration = 4 + Math.random() * 5 + "s";
        root.appendChild(p);
      }
    }

    function installOdysseeEmbedQuit() {
      try {
        if (new URLSearchParams(window.location.search).get("parentHud") === "1") return;
      } catch (e) { /* ignore */ }
      try {
        if (window.self === window.top) return;
      } catch (e) {
        return;
      }
      if (document.getElementById("odyssee-embed-quit-bar")) return;
      const bar = document.createElement("div");
      bar.id = "odyssee-embed-quit-bar";
      bar.className = "odyssee-embed-quit-bar";
      bar.innerHTML =
        "<button type=\"button\" class=\"odyssee-embed-quit-btn\" id=\"odyssee-embed-quit-btn\">Quitter le mode aventure</button>";
      document.body.insertBefore(bar, document.body.firstChild);
      document.getElementById("odyssee-embed-quit-btn").addEventListener("click", () => {
        try {
          window.parent.postMessage({ type: "odyssee-quit" }, window.location.origin);
        } catch (err) {
          try {
            window.parent.postMessage({ type: "odyssee-quit" }, "*");
          } catch (e2) { /* ignore */ }
        }
      });
    }

    const gameMenuApi = { close: () => {} };

    function wireGameMenu() {
      const menuLayer = document.getElementById("game-menu-layer");
      const notebookLayer = document.getElementById("notebook-layer");
      const btnMenu = document.getElementById("btn-game-menu");
      if (!menuLayer || !notebookLayer || !btnMenu) return;

      const closeGameMenu = () => {
        menuLayer.classList.remove("is-open");
        menuLayer.setAttribute("aria-hidden", "true");
        btnMenu.setAttribute("aria-expanded", "false");
      };
      gameMenuApi.close = closeGameMenu;
      const openGameMenu = () => {
        menuLayer.classList.add("is-open");
        menuLayer.setAttribute("aria-hidden", "false");
        btnMenu.setAttribute("aria-expanded", "true");
      };
      const closeNotebookModal = () => {
        notebookLayer.classList.remove("is-open");
        notebookLayer.setAttribute("aria-hidden", "true");
      };
      const openNotebookModal = () => {
        renderNotebook();
        notebookLayer.classList.add("is-open");
        notebookLayer.setAttribute("aria-hidden", "false");
      };

      btnMenu.addEventListener("click", () => openGameMenu());
      const scrimMenu = document.getElementById("game-menu-scrim");
      const dismissMenu = document.getElementById("btn-menu-dismiss");
      if (scrimMenu) scrimMenu.addEventListener("click", closeGameMenu);
      if (dismissMenu) dismissMenu.addEventListener("click", closeGameMenu);

      const btnNb = document.getElementById("btn-open-notebook");
      if (btnNb) {
        btnNb.addEventListener("click", () => {
          closeGameMenu();
          openNotebookModal();
        });
      }

      const btnQuit = document.getElementById("btn-quit-to-jeux");
      if (btnQuit) {
        btnQuit.addEventListener("click", () => {
          closeGameMenu();
          try {
            window.parent.postMessage({ type: "odyssee-quit" }, window.location.origin);
          } catch (err) {
            try { window.parent.postMessage({ type: "odyssee-quit" }, "*"); } catch (e2) { /* ignore */ }
          }
        });
      }

      const scrimNb = document.getElementById("notebook-scrim");
      const dismissNb = document.getElementById("btn-notebook-dismiss");
      if (scrimNb) scrimNb.addEventListener("click", closeNotebookModal);
      if (dismissNb) dismissNb.addEventListener("click", closeNotebookModal);

      ["btn-save", "btn-load"].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("click", closeGameMenu);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (notebookLayer.classList.contains("is-open")) {
          closeNotebookModal();
          e.preventDefault();
          return;
        }
        if (menuLayer.classList.contains("is-open")) {
          closeGameMenu();
          e.preventDefault();
        }
      });
    }

    function wireHeader() {
      document.getElementById("btn-save").addEventListener("click", () => saveGame({ notify: true }));
      document.getElementById("btn-load").addEventListener("click", () => loadGame());
      document.getElementById("btn-new").addEventListener("click", () => {
        if (confirm("Recommencer une nouvelle partie ? La progression sauvegardée sera réinitialisée.")) {
          gameState = defaultState();
          clearAllSaveSlots();
          renderNotebook();
          refreshSkillBars();
          renderScene("intro_1");
          gameMenuApi.close();
        }
      });
    }

    /** Point d'entrée : particules, en-tête, puis sauvegarde ou scène par défaut. */
    function init() {
      installOdysseeEmbedQuit();
      initParticles();
      wireGameMenu();
      wireHeader();
      window.addEventListener("pagehide", persistStateBeforeUnload);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") persistStateBeforeUnload();
      });
      bootstrapGame();
    }

    // Exposer pour onclick inline si besoin d'extension future
    window.gameData = gameData;
    window.renderScene = renderScene;

    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
    else init();
  </script>
</body>
