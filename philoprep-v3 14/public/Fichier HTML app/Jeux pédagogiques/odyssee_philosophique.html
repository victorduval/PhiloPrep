<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>L'Odyssée philosophique — Démo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* =============================================================================
       Variables & reset — palette peinte / cinéma antique (extensible)
       ============================================================================= */
    :root {
      --gold: #D4AF37;
      --gold-light: #FFD700;
      --gold-dark: #B8860B;
      --bronze: #CD7F32;
      --marble: #F5F5DC;
      --night-deep: #0a0e27;
      --night-medium: #1a1f3a;
      --night-light: #2a2f4a;
      --purple: #6B46C1;
      --purple-light: #9F7AEA;
      --red-accent: #C53030;
      --ochre: #CC7722;
      --terracotta: #D4735E;
      --font-title: "Cinzel", serif;
      --font-body: "Crimson Pro", Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    html, body {
      height: 100%;
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #1e2448 0%, var(--night-deep) 55%, #05060f 100%);
      color: var(--marble);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.55;
      overflow: hidden;
    }

    /* Arrière-plan : particules dorées (léger, performant) */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--gold);
      opacity: 0.45;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-12px) translateX(6px); }
      50% { transform: translateY(4px) translateX(-8px); }
      75% { transform: translateY(14px) translateX(4px); }
    }

    #game-container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
      height: 100%;
      max-height: 100dvh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .game-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .btn-game-menu {
      position: absolute;
      top: 0.35rem;
      right: 0.45rem;
      z-index: 40;
      font-family: var(--font-title);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.55rem 0.95rem;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid rgba(212, 175, 55, 0.5);
      background: rgba(10, 14, 39, 0.88);
      color: var(--gold-light);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-game-menu:active {
      transform: scale(0.98);
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 350;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(0.75rem, env(safe-area-inset-top, 0px)) max(0.75rem, env(safe-area-inset-right, 0px)) max(0.75rem, env(safe-area-inset-bottom, 0px)) max(0.75rem, env(safe-area-inset-left, 0px));
      box-sizing: border-box;
    }
    .modal-layer.is-open {
      display: flex;
    }
    .modal-layer-notebook {
      z-index: 360;
    }
    .modal-scrim {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 20, 0.78);
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }
    .modal-panel-menu {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 340px;
      border-radius: 16px;
      padding: 1.35rem 1.25rem;
      background: rgba(26, 31, 58, 0.96);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(212, 175, 55, 0.28);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.55);
    }
    .modal-panel-menu h2 {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 1rem;
      text-align: center;
    }
    .menu-actions-stack {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .menu-actions-stack .btn-menu-item {
      width: 100%;
      font-family: var(--font-title);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--marble);
      transition: background 0.2s, border-color 0.2s;
    }
    .menu-actions-stack .btn-menu-item:hover {
      background: rgba(212, 175, 55, 0.12);
      border-color: rgba(212, 175, 55, 0.35);
    }
    .btn-menu-secondary {
      margin-top: 0.35rem;
      background: transparent !important;
      border-style: dashed !important;
      opacity: 0.9;
    }
    .btn-menu-close {
      margin-top: 0.85rem;
      width: 100%;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: rgba(245, 245, 220, 0.55);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .modal-panel-notebook {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      max-height: min(85dvh, 640px);
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      padding: 1.15rem 1.1rem 1rem;
      background: rgba(26, 31, 58, 0.96);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 175, 55, 0.28);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.55);
    }
    .modal-panel-notebook h2 {
      font-family: var(--font-title);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin: 0 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.25);
      flex-shrink: 0;
    }
    .modal-panel-notebook #notebook-list {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding-right: 0.25rem;
    }

    .btn-ghost, .btn-gold {
      font-family: var(--font-title);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: var(--marble);
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.12); border-color: var(--gold-dark); }
    .btn-gold {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(184, 134, 11, 0.15));
      border-color: var(--gold-dark);
      color: var(--gold-light);
    }
    .btn-gold:hover { transform: translateY(-1px); }

    /* Navigation latérale (dialogue paginé + séquence narrative) — pas de scroll, tactile */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 12;
      width: 48px;
      height: 48px;
      padding: 0;
      margin: 0;
      border-radius: 50%;
      border: 2px solid rgba(212, 175, 55, 0.55);
      background: rgba(10, 14, 39, 0.72);
      color: var(--gold-light);
      font-size: 1.85rem;
      line-height: 1;
      font-family: var(--font-title), serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }
    .nav-arrow:not(:disabled):active {
      background: rgba(212, 175, 55, 0.2);
      border-color: var(--gold-light);
    }
    .nav-arrow:disabled {
      opacity: 0.22;
      cursor: not-allowed;
    }
    .nav-arrow--prev {
      left: max(4px, env(safe-area-inset-left, 4px));
    }
    .nav-arrow--next {
      right: max(4px, env(safe-area-inset-right, 4px));
    }
    @media (min-width: 769px) {
      .nav-arrow {
        width: 46px;
        height: 46px;
        font-size: 1.65rem;
      }
      .nav-arrow--prev { left: 10px; }
      .nav-arrow--next { right: 10px; }
    }

    #game-screen {
      flex: 1 1 0;
      min-height: 0;
      border-radius: 0;
      position: relative;
      overflow: hidden;
      background: rgba(10, 14, 39, 0.5);
      border: none;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
    }
    @media (min-width: 900px) {
      #game-screen {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        margin: 0.5rem;
        max-height: calc(100dvh - 1rem);
      }
      #game-container {
        padding: 0.25rem 0;
      }
    }

    #notebook-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding-right: 0.25rem;
    }
    .notebook-entry {
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.92rem;
    }
    .notebook-entry strong { color: var(--gold-light); font-weight: 600; }
    .notebook-entry .notebook-category {
      font-family: var(--font-title);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(212, 175, 55, 0.85);
      margin-bottom: 0.2rem;
    }
    .notebook-entry p { margin-top: 0.35rem; opacity: 0.88; font-size: 0.85rem; }
    .notebook-empty {
      opacity: 0.55;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* Scène dialogue */
    .dialogue-scene {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: minmax(200px, 32%) 1fr;
      grid-template-rows: 1fr auto;
      height: 100%;
      animation: fadeIn 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (min-width: 769px) {
      .dialogue-scene.dialogue-scene--paged {
        grid-template-columns: minmax(220px, 40%) 1fr;
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Calque décor : image plein écran + léger voile lisibilité + vignette bords */
    .scene-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.75;
      z-index: 0;
      overflow: hidden;
    }
    .scene-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.92;
      filter: blur(0) saturate(1.12) brightness(1.02);
      transform: none;
      transition: opacity 0.8s ease, filter 0.8s ease;
    }
    .scene-bg-gradient {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        100deg,
        rgba(10, 14, 39, 0.42) 0%,
        rgba(10, 14, 39, 0.12) 40%,
        rgba(10, 14, 39, 0.35) 100%
      );
    }
    .scene-background::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(
        ellipse 95% 90% at 50% 45%,
        transparent 0%,
        transparent 38%,
        rgba(10, 14, 39, 0.35) 72%,
        rgba(10, 14, 39, 0.72) 100%
      );
    }

    .character-portrait {
      position: relative;
      z-index: 2;
      grid-column: 1;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 1.25rem 1rem 1.5rem;
      gap: 0.5rem;
      transition: opacity 0.3s ease;
    }
    .dialogue-scene.narration-page .character-portrait {
      display: none;
    }
    .dialogue-scene.narration-page .dialogue-box {
      margin-left: 1rem;
      margin-right: 1rem;
    }
    .dialogue-scene.dialogue-scene--paged .dialogue-main {
      grid-column: 2;
      grid-row: 1 / -1;
      min-height: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
    }
    .dialogue-scene.dialogue-scene--paged .dialogue-box {
      grid-column: unset;
      grid-row: unset;
      align-self: stretch;
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      overflow: hidden;
      overflow-y: hidden;
    }
    .dialogue-scene.dialogue-scene--paged.narration-page .dialogue-main {
      grid-column: 1 / -1;
    }
    @media (max-width: 768px) {
      .dialogue-scene.dialogue-scene--paged.narration-page .dialogue-box {
        margin-left: 0;
        margin-right: 0;
      }
    }
    .portrait-frame {
      width: min(220px, 85vw);
      aspect-ratio: 3/4;
      border-radius: 14px;
      padding: 5px;
      border: 2px solid rgba(212, 175, 55, 0.65);
      background: linear-gradient(145deg, var(--gold-dark), var(--bronze), var(--night-medium));
      box-shadow: 0 22px 58px rgba(0, 0, 0, 0.78);
      position: relative;
      z-index: 2;
    }
    .portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      filter: contrast(1.1) saturate(1.15) brightness(1.02);
      background: #222;
    }
    .character-name {
      font-family: var(--font-title);
      font-size: 1.15rem;
      color: var(--gold-light);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
    }
    .character-title {
      font-size: 0.82rem;
      opacity: 0.85;
      text-align: center;
      max-width: 260px;
    }

    .dialogue-box {
      position: relative;
      z-index: 2;
      grid-column: 2;
      grid-row: 1 / -1;
      margin: 1rem 1rem 1rem 0;
      padding: 1rem 1.1rem 1.1rem;
      align-self: end;
      min-height: 0;
      max-height: calc(100% - 2rem);
      overflow-y: auto;
      overflow-x: hidden;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    .dialogue-text {
      max-height: none;
      overflow-y: visible;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      padding: 36px 30px 30px;
      border-left: 4px solid var(--purple-light);
      font-size: 1.2em;
      line-height: 1.9;
      margin-bottom: 25px;
    }
    .dialogue-scene--paged .dialogue-nav--footer {
      display: none;
    }
    .dialogue-scene--paged .dialogue-main {
      padding-left: 56px;
      padding-right: 56px;
      box-sizing: border-box;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    @media (min-width: 769px) {
      .dialogue-scene--paged .dialogue-main {
        padding-left: 52px;
        padding-right: 52px;
      }
    }
    .dialogue-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .dialogue-nav .btn-ghost:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .dialogue-scene {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 15px;
        padding: 20px 15px;
        box-sizing: border-box;
      }
      .dialogue-scene.dialogue-scene--paged {
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-end;
        padding: 0;
        padding-bottom: max(3.35rem, calc(env(safe-area-inset-bottom, 0px) + 2.85rem));
        gap: 0;
        height: 100%;
        max-height: 100%;
      }
      .dialogue-scene.dialogue-scene--paged .nav-arrow {
        top: auto;
        bottom: max(0.3rem, env(safe-area-inset-bottom, 0px));
        transform: none;
      }
      .dialogue-scene.dialogue-scene--paged .character-portrait:not(.is-hidden) {
        order: 1;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        max-height: min(44vh, 48dvh);
        position: relative;
        top: auto;
        padding: 0.15rem 48px 0.35rem;
        justify-content: center;
        align-items: center;
      }
      .dialogue-scene.dialogue-scene--paged.narration-page .character-portrait {
        display: none;
      }
      .dialogue-scene.dialogue-scene--paged.narration-page .dialogue-main {
        order: 1;
        flex: 1 1 auto;
        max-height: none;
        justify-content: flex-end;
      }
      .dialogue-scene.dialogue-scene--paged .portrait-frame {
        width: min(68vw, 228px);
        max-height: min(36vh, 280px);
        margin: 0 auto;
      }
      .dialogue-scene.dialogue-scene--paged .dialogue-main {
        order: 2;
        grid-column: unset;
        grid-row: unset;
        width: 100%;
        flex: 0 1 auto;
        min-height: 0;
        max-height: min(40vh, 44dvh);
        padding-left: 0;
        padding-right: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .dialogue-scene.dialogue-scene--paged .dialogue-box {
        width: 100%;
        flex: 0 1 auto;
        min-height: 0;
        max-height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden;
      }
      .dialogue-scene.dialogue-scene--paged .dialogue-text {
        font-size: 0.9rem;
        line-height: 1.45;
        padding: 10px 12px;
        margin-bottom: 6px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
        max-height: none;
        -webkit-overflow-scrolling: auto;
      }
      .dialogue-scene.dialogue-scene--paged.narration-page .dialogue-text {
        font-size: 0.88rem;
        line-height: 1.42;
      }
      .dialogue-scene.dialogue-scene--paged .dialogue-text .dialogue-line > div {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 14;
        overflow: hidden;
      }
      .dialogue-scene.dialogue-scene--paged .choices {
        flex: 0 1 auto;
        min-height: 0;
        overflow: hidden;
        gap: 0.4rem;
      }
      .dialogue-scene.dialogue-scene--paged .choice-btn {
        font-size: 0.82rem;
        padding: 0.55rem 0.65rem;
        line-height: 1.35;
      }
      .character-portrait {
        width: 35%;
        flex-shrink: 0;
        position: sticky;
        top: 20px;
        grid-column: unset;
        grid-row: unset;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 0;
        max-height: none;
      }
      .portrait-frame {
        width: 100%;
        height: auto;
        aspect-ratio: 3 / 4;
      }
      .character-name {
        font-size: 1em;
        margin-top: 8px;
      }
      .character-title {
        font-size: 0.75em;
        max-width: 100%;
      }
      .dialogue-box {
        grid-column: unset;
        grid-row: unset;
        width: 65%;
        flex: 1;
        min-width: 0;
        margin: 0;
        padding: 0;
        max-height: none;
        align-self: stretch;
        overflow: visible;
        -webkit-overflow-scrolling: touch;
      }
      .dialogue-text {
        font-size: 1em;
        padding: 15px;
        max-height: 70vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        line-height: 1.65;
        margin-bottom: 12px;
      }
      /* Annule le scroll pour le mode paginé (règles plus spécifiques au-dessus) */
      .dialogue-scene.dialogue-scene--paged .dialogue-text {
        max-height: none;
        overflow: hidden;
        overflow-y: hidden;
      }
      .choice-btn {
        font-size: 0.95rem;
        padding: 0.75rem 0.95rem;
      }
    }
    .dialogue-text p,
    .dialogue-text .dialogue-line {
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95);
    }
    .dialogue-line {
      margin-bottom: 0.65rem;
      opacity: 0;
      animation: lineReveal 0.5s ease forwards;
    }
    .dialogue-line:nth-child(1) { animation-delay: 0.05s; }
    .dialogue-line:nth-child(2) { animation-delay: 0.15s; }
    .dialogue-line:nth-child(3) { animation-delay: 0.25s; }
    .dialogue-line:nth-child(4) { animation-delay: 0.35s; }
    .dialogue-line:nth-child(5) { animation-delay: 0.45s; }
    .dialogue-line:nth-child(n+6) { animation-delay: 0.55s; }
    @keyframes lineReveal {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .dialogue-line.speaker-narration {
      font-style: italic;
      color: #c4b8a8;
      border-left: 3px solid var(--bronze);

    .dialogue-line .speaker-tag {

      margin-bottom: 0.25rem;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .choice-btn {
      position: relative;
      overflow: hidden;
      text-align: left;
      font-family: var(--font-body);
      font-size: 1.05rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid rgba(107, 70, 193, 0.85);

        135deg,
        rgba(107, 70, 193, 0.88),
        rgba(74, 50, 120, 0.82)

    .choice-btn:hover {

    .choice-btn::before {
      content: "";

      top: 0;
      left: -100%;

      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      transition: left 0.55s ease;
    }
    .choice-btn:hover::before { left: 100%; }

    .wrong-attempt-panel {
      margin-top: 1.25rem;
      padding: 1.35rem 1.5rem 1.5rem;
      border-radius: 14px;
      border: 1px solid rgba(159, 122, 234, 0.5);
      background: rgba(10, 14, 39, 0.72);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.35s ease;
    }
    .wrong-attempt-title {
      font-family: var(--font-title);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;

    }

    .btn-retry-wrong {

    }

    .btn-continue {
      font-family: var(--font-title);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.72rem;
      padding: 0.75rem 1.25rem;

      border: none;
      cursor: pointer;

      color: #1a1020;
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.25);

    .btn-continue:hover { filter: brightness(1.08); }

    /* Transition & ending */
    .panel-center {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 2rem auto;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }
    .panel-center h2 {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .panel-center p, .panel-center li { text-align: left; }
    .panel-center .subtitle { opacity: 0.85; margin-bottom: 1.25rem; }
    .panel-center ul { margin: 0.75rem 0 0 1.25rem; }
    .unlocked-notions, .demo-info {
      text-align: left;
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.25);

    /* Mini-jeu tri */

      padding: 1rem;

      min-height: 0;

    }
    @media (max-width: 768px) {
      .minigame-wrap {
        padding: 0.65rem 0.7rem max(0.65rem, env(safe-area-inset-bottom, 0px));

      }
      .minigame-wrap--tabbed .minigame-instruction {
        font-size: 0.86rem;
        margin-bottom: 0.35rem;
        line-height: 1.4;
      }
    }
    @media (min-width: 769px) {
      .minigame-wrap {
        height: 100%;
        overflow-y: auto;
      }
    }
    .minigame-body-grow {

    }
    @media (min-width: 769px) {
      .minigame-body-grow {
        flex: none;
      }
    }
    .minigame-wrap--tabbed .minigame-tab-panels {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }
    .minigame-wrap--tabbed .minigame-page {
      max-height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .minigame-page[hidden] {
      display: none !important;
    }
    .minigame-pager-controls {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.25rem 0 0.15rem;
      margin-top: 0.15rem;
    }
    .minigame-page-indicator {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--font-title);
      color: rgba(212, 175, 55, 0.9);
    }
    .minigame-footer-slot[hidden] {
      display: none !important;
    }
    .minigame-footer-slot {
      flex: 0 0 auto;
      padding-top: 0.35rem;
    }
    .transition-screen {
      position: relative;
      z-index: 2;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      max-width: 640px;
      width: calc(100% - 1.25rem);
      margin: max(0.35rem, env(safe-area-inset-top, 0px)) auto max(0.5rem, env(safe-area-inset-bottom, 0px));
      padding: clamp(0.65rem, 3vw, 1.35rem);
      overflow: hidden;
      text-align: center;
      animation: fadeIn 0.65s ease;
    }
    .transition-screen > h2 {
      flex: 0 0 auto;
      font-family: var(--font-title);
      color: var(--gold);
      font-size: clamp(1.05rem, 4vw, 1.5rem);
      margin-bottom: 0.45rem;
    }
    .transition-screen .minigame-tab-panels {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      text-align: left;
    }
    .transition-screen .minigame-page {
      font-size: 0.95rem;
      line-height: 1.55;
      max-height: 100%;
      overflow: hidden;
    }
    .transition-screen .btn-continue {
      flex: 0 0 auto;
      margin-top: 0.65rem;
    }
    .ending-screen-wrap {
      position: relative;
      z-index: 2;
      flex: 1 1 auto;
      min-height: 0;
      max-width: 640px;
      width: calc(100% - 1.1rem);
      margin: max(0.35rem, env(safe-area-inset-top, 0px)) auto max(0.45rem, env(safe-area-inset-bottom, 0px));
      padding: clamp(0.65rem, 3vw, 1.35rem);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      text-align: center;
    }
    .ending-screen-wrap > h2 {
      flex: 0 0 auto;
      font-family: var(--font-title);
      color: var(--gold);
      font-size: clamp(1.05rem, 4vw, 1.45rem);
      margin-bottom: 0.35rem;
    }
    .ending-screen-wrap .minigame-tab-panels {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      text-align: left;
    }
    .ending-screen-wrap .ending-page {
      font-size: 0.95rem;
      line-height: 1.55;
      max-height: 100%;
      overflow: hidden;
    }
    .minigame-wrap h2 {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 1.15rem;
      margin-bottom: 0.35rem;
    }
    .minigame-instruction {
      opacity: 0.88;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .sorting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 720px) {
      .sorting-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .mg-sort-play-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 0 0.15rem 0.35rem 0;
    }
    .minigame-wrap--tabbed .mg-sort-play-scroll {
      max-height: 100%;
    }
    .drop-zone {
      min-height: 140px;
      padding: 0.5rem;
      border-radius: 12px;
      border: 2px dashed rgba(212, 175, 55, 0.35);
      background: rgba(0, 0, 0, 0.2);
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.drag-over {
      border-color: var(--gold-light);
      background: rgba(107, 70, 193, 0.12);
    }
    .drop-zone h3 {
      font-family: var(--font-title);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.2rem;
    }
    .drop-zone .hint { font-size: 0.75rem; opacity: 0.65; margin-bottom: 0.5rem; }

    .card-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 1rem;
    }
    .sort-card {
      cursor: grab;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(42, 47, 74, 0.95), rgba(26, 31, 58, 0.9));
      border: 1px solid rgba(212, 175, 55, 0.25);
      font-size: 0.85rem;
      max-width: 100%;
      touch-action: none;
    }
    .sort-card:active { cursor: grabbing; }
    .sort-card.placed { opacity: 0.95; }

    @media (max-width: 768px) {
      .drop-zone {
        min-height: 100px;
        padding: 0.4rem;
      }
      .drop-zone h3 {
        font-size: 0.62rem;
      }
      .drop-zone .hint {
        font-size: 0.68rem;
        line-height: 1.25;
      }
      .sort-card {
        font-size: 0.76rem;
        padding: 0.45rem 0.5rem;
      }
      .card-bank {
        padding: 0.5rem;
        gap: 0.35rem;
        margin-bottom: 0.65rem;
      }
    }

    .minigame-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    /* Séquence narrative — version pédagogique (ex. allégorie de la caverne) */
    .narrative-sequence {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: clamp(0.5rem, 2vw, 1.25rem) clamp(0.75rem, 2.5vw, 1.5rem) clamp(0.65rem, 2vw, 1rem);
      max-width: 1400px;
      margin: 0 auto;
      height: 100%;
      max-height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
      animation: fadeIn 0.65s ease;
    }
    .narrative-sequence-header {
      flex: 0 0 auto;
    }
    .narrative-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: clamp(0.35rem, 1.5vw, 0.75rem);
    }
    .narrative-title {
      font-family: var(--font-title);
      font-size: clamp(1.45rem, 4.2vw, 2.8em);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.35rem;
      text-shadow: 0 2px 10px rgba(218, 165, 32, 0.25);
    }
    .narrative-subtitle {
      font-family: var(--font-title);
      font-size: clamp(0.95rem, 2.4vw, 1.2em);
      color: var(--gold);
      margin-bottom: clamp(1rem, 2.5vw, 1.85rem);
      font-style: italic;
    }
    .narrative-step-title {
      font-family: var(--font-title);
      font-size: clamp(1.1rem, 3vw, 1.8em);
      color: var(--gold-light);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .narrative-image-container {
      flex: 75 1 0;
      min-height: 0;
      max-width: min(1200px, 100%);
      margin: 0 auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .narrative-image {
      width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      vertical-align: middle;
    }
    .narrative-text {
      flex: 25 1 0;
      min-height: 0;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      font-size: clamp(0.88rem, 2.8vw, 1.08rem);
      line-height: 1.55;
      color: var(--marble);
      padding: clamp(0.55rem, 1.8vw, 0.95rem) clamp(0.65rem, 2vw, 1.1rem);
      background: rgba(26, 31, 58, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 4px solid var(--purple-light);
      text-align: left;
      overflow: hidden;
    }
    .narrative-text-inner {
      max-height: 100%;
      overflow: hidden;
    }
    .narrative-text strong {
      color: var(--gold-light);
      font-weight: 600;
    }
    .narrative-text em {
      color: var(--purple-light);
      font-style: italic;
    }
    .narrative-footer {
      flex: 0 0 auto;
      margin-top: 0.35rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0 52px;
      box-sizing: border-box;
    }
    .narrative-progress {
      margin: 0;
      color: var(--gold);
      font-family: var(--font-title);
      font-size: clamp(0.75rem, 2vw, 0.95em);
    }
    .narrative-skip {
      font-size: 0.65rem !important;
      padding: 0.4rem 0.65rem !important;
    }
    @media (max-width: 768px) {
      .narrative-sequence .nav-arrow {
        top: auto;
        bottom: max(0.3rem, env(safe-area-inset-bottom, 0px));
        transform: none;
      }
      .narrative-sequence {
        position: relative;
        padding-left: 0;
        padding-right: 0;
        padding-bottom: max(2.5rem, env(safe-area-inset-bottom, 0px));
      }
      .narrative-title {
        font-size: clamp(1.05rem, 5.2vw, 1.4rem);
        margin-bottom: 0.15rem;
      }
      .narrative-subtitle {
        margin-bottom: 0.4rem;
        font-size: 0.82rem;
      }
      .narrative-step-title {
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
      }
      .narrative-footer {
        padding: 0 52px;
        justify-content: center;
      }
      .narrative-text-inner {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 9;
      }
    }

    /* Config modal & loading */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 8, 20, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.4s ease;
    }
    .modal glass-panel, .glass-panel {
      background: rgba(26, 31, 58, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      border-radius: 16px;
      padding: 1.75rem;
      max-width: 480px;
      width: 100%;
    }
    .modal h2 {
      font-family: var(--font-title);
      color: var(--gold);
      margin-bottom: 0.75rem;
      font-size: 1.2rem;
    }
    .modal p { margin-bottom: 0.75rem; font-size: 0.95rem; }
    .modal input[type="text"], .modal input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid rgba(212, 175, 55, 0.35);
      background: rgba(0, 0, 0, 0.35);
      color: var(--marble);
      font-family: var(--font-body);
      margin-bottom: 0.75rem;
    }
    .modal .info { font-size: 0.82rem; opacity: 0.75; margin-top: 0.5rem; }
    .modal .info a { color: var(--purple-light); }
    .error-msg {
      color: #ff8a8a;
      font-size: 0.88rem;
      margin-bottom: 0.5rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    .loading-screen {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background: rgba(10, 14, 39, 0.94);
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-message {
      font-family: var(--font-title);
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      color: var(--gold-light);
    }
    .loading-bar {
      width: min(320px, 90%);
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    .loading-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      transition: width 0.35s ease;
    }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      z-index: 500;
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      background: rgba(26, 31, 58, 0.95);
      border: 1px solid var(--gold-dark);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      font-size: 0.9rem;
      max-width: 90vw;
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
      pointer-events: none;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Barre « Quitter » quand le jeu est intégré en iframe (ex. PhiloPrep) */
    .odyssee-embed-quit-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 400;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top, 0px));
      pointer-events: none;
      background: linear-gradient(180deg, rgba(10, 14, 39, 0.65) 0%, transparent 100%);
    }
    .odyssee-embed-quit-btn {
      pointer-events: auto;
      font-family: var(--font-title);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.55rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.45);
      cursor: pointer;
      background: rgba(26, 31, 58, 0.92);
      color: var(--gold-light);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }
    .odyssee-embed-quit-btn:hover {
      background: rgba(40, 46, 88, 0.95);
    }

    /* ============================================================
       Mini-jeux : Doxa & Aporie (extension Socrate → avant Platon)
       ============================================================ */
    .doxa-exercise {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .doxa-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 12px;
      border-left: 4px solid var(--gold-light);
    }
    .doxa-statement {
      font-size: 1.05em;
      margin-bottom: 0.75rem;
      color: var(--marble);
      line-height: 1.6;
    }
    .doxa-categories {
      display: flex;
      gap: 0.6rem;

  <script>
    /**
     * =============================================================================
     * L'ODYSSÉE PHILOSOPHIQUE — moteur monofichier (HTML + CSS + JS)

     * IMAGES LOCALES : placez les .jpg générés (Midjourney, etc.) dans assets/…

    /** Clé primaire par chemin (évite les collisions si plusieurs copies du jeu sur le même domaine) ; ancienne clé lue pour compatibilité. */
    const LEGACY_SAVE_KEY = "odyssee_save";
    function getPrimarySaveKey() {
      try {
        return "odyssee_save_v2:" + (location.pathname || "/");
      } catch (e) {
        return "odyssee_save_v2:/";
      }
    }
    function readSaveRaw() {
      const primary = getPrimarySaveKey();
      let raw = localStorage.getItem(primary);
      if (raw) return { raw, key: primary };
      raw = localStorage.getItem(LEGACY_SAVE_KEY);
      if (raw) return { raw, key: LEGACY_SAVE_KEY };
      return null;
    }
    function migrateSaveToPrimaryIfNeeded(keyUsed, raw) {
      if (keyUsed === LEGACY_SAVE_KEY && raw) {
        try {
          localStorage.setItem(getPrimarySaveKey(), raw);
        } catch (e) { /* ignore */ }
      }
    }
    function clearAllSaveSlots() {
      try {
        localStorage.removeItem(getPrimarySaveKey());
        localStorage.removeItem(LEGACY_SAVE_KEY);
      } catch (e) { /* ignore */ }
    }

    /** Cibles .jpg — les placeholders .svg portent le même nom de base. */

      }

    /** Scène dialogue : gameData.background → clé IMAGE_PATHS.backgrounds */
    const BACKGROUND_KEY_ALIASES = {
      athens_agora: "athens_agora",
      academy: "plato_academy"
    };

    /** Midjourney / assets déjà présents : on charge le .jpg directement ; sinon placeholder .svg */
    const REAL_JPG_ASSETS = new Set([
      "assets/portraits/socrate.jpg",
      "assets/portraits/platon.jpg",
      "assets/portraits/aristote.jpg",
      "assets/backgrounds/athens_agora_sunset.jpg",

      "assets/scenes/caverne/03_cave_exit.jpg",
      "assets/scenes/caverne/04_outside_world.jpg"
    ]);

    function svgFallbackForPath(jpgPath) {
      return jpgPath.replace(/\.jpe?g$/i, ".svg");
    }

    function resolveFromJpgTarget(jpgPath) {
      if (!jpgPath) return "";
      if (REAL_JPG_ASSETS.has(jpgPath)) return jpgPath;
      return svgFallbackForPath(jpgPath);
    }

    function getImagePath(type, key) {
      const p = IMAGE_PATHS[type] && IMAGE_PATHS[type][key];
      return p ? resolveFromJpgTarget(p) : "";
    }

    function escapeAttrSingle(v) {
      return String(v).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function escapeHtml(v) {
      return String(v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function isMobileGameViewport() {
      return typeof window.matchMedia !== "undefined" && window.matchMedia("(max-width: 768px)").matches;
    }

    /**
     * Découpe un texte / HTML léger de transition en pages pour mobile (évite le scroll).
     */
    function splitTransitionContentToPages(html) {
      const s = String(html || "").trim();
      if (!s) return [];
      const blockPs = s.match(/<p\b[\s\S]*?<\/p>/gi);
      if (blockPs && blockPs.length > 1) return blockPs.map((x) => x.trim());
      if (blockPs && blockPs.length === 1) return blockPs;
      return s.split(/\n{2,}/).map((x) => x.trim()).filter(Boolean);
    }

    /**
     * Mini-jeux : sur mobile, plusieurs blocs HTML coexistent dans le DOM ; un seul est affiché (pas de défilement du cadre).
     */
    function mountMinigameTabbedPages(opts) {
      const wrapClass = opts.wrapClass || "";
      const title = opts.title || "";
      const instruction = opts.instruction || "";
      const bodyChunks = opts.bodyChunks || [];
      const footerHtml = opts.footerHtml || "";
      const afterMount = opts.afterMount;

      const screen = document.getElementById("game-screen");
      const chunks = bodyChunks.map(String).filter((c) => c.trim() !== "");
      const titleHtml = title ? `<h2>${escapeHtml(title)}</h2>` : "";
      const instHtml = instruction ? `<p class="minigame-instruction">${instruction}</p>` : "";

      const singleHtml = `
      <div class="minigame-wrap ${wrapClass}">
        ${titleHtml}
        ${instHtml}
        <div class="minigame-body-grow">${chunks.join("")}</div>
        ${footerHtml}
      </div>`;

      if (!isMobileGameViewport() || chunks.length <= 1) {
        screen.innerHTML = singleHtml;
        if (afterMount) afterMount(screen);
        return;
      }

      const pagesHtml = chunks
        .map(
          (html, i) =>
            `<div class="minigame-page" data-page="${i}"${i === 0 ? "" : " hidden"}>${html}</div>`
        )
        .join("");

      screen.innerHTML = `
      <div class="minigame-wrap minigame-wrap--tabbed ${wrapClass}">
        ${titleHtml}
        ${instHtml}
        <div class="minigame-tab-panels">${pagesHtml}</div>
        <div class="minigame-pager-controls">
          <button type="button" class="btn-ghost minigame-page-prev" aria-label="Précédent" disabled>‹</button>
          <span class="minigame-page-indicator"></span>
          <button type="button" class="btn-ghost minigame-page-next" aria-label="Suivant">›</button>
        </div>
        <div class="minigame-footer-slot" hidden>${footerHtml}</div>
      </div>`;

      const prev = screen.querySelector(".minigame-page-prev");
      const next = screen.querySelector(".minigame-page-next");
      const ind = screen.querySelector(".minigame-page-indicator");
      const footerSlot = screen.querySelector(".minigame-footer-slot");
      const instEl = screen.querySelector(".minigame-instruction");
      let pageIdx = 0;

      function syncUi() {
        screen.querySelectorAll(".minigame-page").forEach((el, i) => {
          if (i === pageIdx) el.removeAttribute("hidden");
          else el.setAttribute("hidden", "");
        });
        prev.disabled = pageIdx <= 0;
        const last = pageIdx >= chunks.length - 1;
        next.hidden = last;
        if (ind) ind.textContent = `${pageIdx + 1} / ${chunks.length}`;
        if (footerSlot) footerSlot.hidden = !last;
        if (instEl) instEl.style.display = pageIdx === 0 ? "" : "none";
      }

      prev.addEventListener("click", () => {
        if (pageIdx > 0) {
          pageIdx--;
          syncUi();
        }
      });
      next.addEventListener("click", () => {
        if (pageIdx < chunks.length - 1) {
          pageIdx++;
          syncUi();
        }
      });
      syncUi();
      if (afterMount) afterMount(screen);
    }

    /**
     * Résout les chemins assets/... par rapport au dossier du fichier HTML (pas la racine du site).
     * Indispensable si l’URL est du type http://localhost:8000/odyssee_philosophique/odyssee_philosophique.html
     */
    function assetUrl(relPath) {
      if (!relPath) return "";
      try {
        return new URL(relPath, new URL(".", window.location.href).href).href;
      } catch (e) {
        return relPath;
      }
    }

    const gameData = {

            { speaker: "socrate", text: "Ah ! Voilà quelqu'un de nouveau sur notre place publique. Dis-moi, jeune être, crois-tu <em>savoir</em> ce qu'est la vérité ? La justice ? Le bien ?" },
            { speaker: "socrate", text: "Je vois dans ton regard que tu penses peut-être que oui... mais laisse-moi te poser une question :" },
            { speaker: "socrate", text: "<strong>Comment distingues-tu celui qui sait vraiment de celui qui fait seulement semblant de savoir ?</strong>" },
            { speaker: "socrate", text: "Vois-tu ces orateurs là-bas ? Ils parlent avec assurance, séduisent les foules par leurs beaux discours." },

    function validateSophismeScene() {
      const scene = window.sophismeScene;
      if (!scene || !scene.items) return;
      const answers = window.sophismeAnswers || {};
      let ok = 0;
      scene.items.forEach((it) => {
        const sel = answers[String(it.id)] || document.querySelector(`select[data-sid=\"${it.id}\"]`)?.value || "";
        const good = sel === it.sophismeType;
        if (good) ok++;
        const fb = document.getElementById("soph-fb-" + it.id);
        if (fb) {
          fb.innerHTML = good
            ? `<div class="feedback-correct">✓ ${escapeHtml(it.nom)} — ${escapeHtml(it.explication)}</div>`
            : `<div class="feedback-wrong">✗ Attendu : <strong>${escapeHtml(it.nom)}</strong>. ${escapeHtml(it.explication)}</div>`;
        }
      });
      const ratio = ok / scene.items.length;
      const th = scene.successThreshold ?? 0.6;
      if (ratio < th) {
        const wrap = document.querySelector(".mg-sophisme");
        if (wrap) {
          showWrongAttemptPanel(wrap, {
            title: "Score insuffisant",
            bodyHtml: `<p>Tu as <strong>${ok} / ${scene.items.length}</strong> réponses justes. Il faut au moins <strong>${Math.round(th * 100)}%</strong>.</p>`
          });
        }
        return;
      }
      const g = scene.skillGain || { examen: 15, clarte: 10 };
      Object.keys(g).forEach((k) => updateSkill(k, g[k]));
      showToast("Sophismes repérés !");
      setTimeout(() => goToScene(scene.nextScene), 900);
    }

    function validatePersuasionScene() {
      const scene = window.persuasionScene;
      if (!scene) return;
      let allOk = true;
      (scene.discours || []).forEach((disc, idx) => {
        (disc.techniques || []).forEach((t) => {
        const inp = document.querySelector(`input[data-di=\"${idx}\"][data-tid=\"${t.id}\"]`);
        const checked = inp && inp.checked;
        const expect = !!t.present;
          if (checked !== expect) allOk = false;
        });
      });
      if (!allOk) {
        const wrap = document.querySelector(".minigame-wrap");
        if (wrap) {
          showWrongAttemptPanel(wrap, {
            title: "Cases à revoir",
            bodyHtml: "<p>Coche <strong>uniquement</strong> les techniques réellement présentes dans chaque discours (selon le récit), puis réessaie.</p>"
          });
        }
        return;
      }
      const g = scene.skillGain || {};
      Object.keys(g).forEach((k) => updateSkill(k, g[k]));
      const c = scene.conclusion || {};
      document.getElementById("persuasion-after").innerHTML = `
        <div class="mg-panel">
          <p><strong>${escapeHtml((c.speaker || "socrate").toUpperCase())}</strong></p>
          <p>${c.text || ""}</p>
          <button type="button" class="btn-continue" id="btn-pers-next">Continuer →</button>
        </div>`;
      document.getElementById("btn-pers-next").addEventListener("click", () => goToScene(scene.nextScene));

    function validateDoxaExercise() {
      const gameData = window.doxaGameData;
      const answers = window.doxaAnswers || {};
      if (!gameData || !gameData.items) return;

      const items = gameData.items;
      const n = items.length;
      let correct = 0;

      items.forEach((item) => {
        const userAnswer = answers[item.id];
        const isCorrect = userAnswer === item.doxaType;
        if (isCorrect) correct++;
        const feedbackDiv = document.getElementById("feedback-" + item.id);
        if (feedbackDiv) {
          feedbackDiv.innerHTML = `
            <div class="${isCorrect ? "feedback-correct" : "feedback-wrong"}">
              ${isCorrect ? "✓ " : "✗ "}${item.explanation}
            </div>
          `;
        }
      });

      const score = correct / n;
      const th = gameData.successThreshold ?? 0.6;

      if (score < th) {
        const wrap = document.querySelector(".minigame-wrap");
        if (wrap) {
          showWrongAttemptPanel(wrap, {
            title: "Doxa à corriger",
            bodyHtml: `
              <p>Tu as <strong>${correct} sur ${n}</strong> bonnes classifications.</p>
              <p>Il faut au moins <strong>${Math.round(th * 100)}%</strong> de réussite pour poursuivre.</p>
              <p>Relis chaque affirmation et cherche ce que le texte présente comme « naturel », évident ou indiscutable.</p>
            `
          });
        }
        return;
      }

      let skillGain = {};
      if (score >= 0.8) skillGain = { examen: 20, clarte: 15 };
      else if (score >= th) skillGain = { examen: 12, clarte: 8 };
      else skillGain = { examen: 5 };

      Object.keys(skillGain).forEach((k) => updateSkill(k, skillGain[k]));
      showToast(`Bravo ! Tu as détecté la doxa (${Math.round(score * 100)}%).`);

      setTimeout(() => goToScene(gameData.nextScene), 1200);
    }

    /**
     * Réordonnancement des <li> (reconstruction du raisonnement, chaîne causale).
     * Le drag HTML5 est inutilisable sur beaucoup de navigateurs mobiles ; on combine
     * drag (desktop) + touch avec écouteurs document pour le suivi du doigt.
     */
    function initReorderableList(list) {
      if (!list) return;
      let dragEl = null;
      let touchActive = false;

      function insertBeforeNeighbor(clientY) {
        if (!dragEl) return;
        const siblings = [...list.querySelectorAll(":scope > li")].filter((x) => x !== dragEl);
        let placed = false;
        for (const li of siblings) {
          const rect = li.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          if (clientY < mid) {
            list.insertBefore(dragEl, li);
            placed = true;
            break;
          }
        }
        if (!placed) list.appendChild(dragEl);
      }

      function onDocTouchMove(e) {
        if (!touchActive || !dragEl || e.touches.length !== 1) return;
        e.preventDefault();
        insertBeforeNeighbor(e.touches[0].clientY);
      }

      function onDocTouchEnd() {
        document.removeEventListener("touchmove", onDocTouchMove);
        document.removeEventListener("touchend", onDocTouchEnd);
        document.removeEventListener("touchcancel", onDocTouchEnd);
        if (touchActive && dragEl) dragEl.classList.remove("dragging");
        touchActive = false;
        dragEl = null;
      }

      list.querySelectorAll(":scope > li").forEach((li) => {
        li.addEventListener("dragstart", (e) => {
          dragEl = li;
          li.classList.add("dragging");
          if (e.dataTransfer) {
            try {
              e.dataTransfer.effectAllowed = "move";
              e.dataTransfer.setData("text/plain", String(li.dataset.ordre || ""));
            } catch (err) {}
          }
        });
        li.addEventListener("dragend", () => {
          li.classList.remove("dragging");
          dragEl = null;
        });
        li.addEventListener("dragover", (ev) => {
          ev.preventDefault();
        });
        li.addEventListener("drop", (ev) => {
          ev.preventDefault();
          if (!dragEl || dragEl === li) return;
          const rect = li.getBoundingClientRect();
          const before = ev.clientY < rect.top + rect.height / 2;
          if (before) list.insertBefore(dragEl, li);
          else list.insertBefore(dragEl, li.nextSibling);
        });

        li.addEventListener(
          "touchstart",
          (e) => {
            if (e.touches.length !== 1) return;
            onDocTouchEnd();
            touchActive = true;
            dragEl = li;
            li.classList.add("dragging");
            document.addEventListener("touchmove", onDocTouchMove, { passive: false });
            document.addEventListener("touchend", onDocTouchEnd);
            document.addEventListener("touchcancel", onDocTouchEnd);
          },
          { passive: true }
        );
      });
    }

    // --- Progression & carnet ---
    function updateSkill(skillName, delta) {
      if (!gameState.skills[skillName]) gameState.skills[skillName] = 0;
      gameState.skills[skillName] = Math.min(100, gameState.skills[skillName] + (delta || 0));
      refreshSkillBars();
    }

    function refreshSkillBars() {
      /* Barres de compétences retirées de l’interface ; les scores restent dans gameState. */
    }

    function addNotionsToNotebook(keys) {
      if (!keys || !keys.length) return;
      keys.forEach((k) => {
        if (!gameData.notions[k]) return;
        if (gameState.notebookNotionKeys.includes(k)) return;
        gameState.notebookNotionKeys.push(k);
        showToast("Notion débloquée : " + gameData.notions[k].name);
      });
      renderNotebook();
    }

    function renderNotebook() {
      const list = document.getElementById("notebook-list");
      if (!gameState.notebookNotionKeys.length) {
        list.innerHTML = "<p class=\"notebook-empty\">Aucune notion encore. Progressez dans l'histoire pour remplir ce carnet.</p>";
        return;
      }
      list.innerHTML = gameState.notebookNotionKeys.map((key) => {
        const n = gameData.notions[key];
        if (!n) return "";
        const ex = (n.examples || []).slice(0, 2).map((e) => `<li>${e}</li>`).join("");
        const cat = n.category ? `<div class="notebook-category">${escapeHtml(n.category)}</div>` : "";
        return `<div class="notebook-entry">
          ${cat}
          <strong>${n.name}</strong>
          <p>${n.description}</p>
          ${ex ? "<ul style='margin:0.4rem 0 0 1rem;font-size:0.82rem;opacity:0.9'>" + ex + "</ul>" : ""}
        </div>`;
      }).join("");
    }

    function buildSavePayload() {
      return {
        version: "1.0",
        timestamp: Date.now(),
        currentScene: gameState.currentScene,
        skills: { ...gameState.skills },
        notebookNotionKeys: [...gameState.notebookNotionKeys],
        unlockedPhilosophers: [...gameState.unlockedPhilosophers],
        settings: { ...gameState.settings },
        resume: gameState.resume && typeof gameState.resume === "object" ? gameState.resume : null
      };
    }

    /** Sauvegarde : `notify: true` uniquement depuis le menu « Sauver » (évite un toast à chaque changement de scène). */
    function saveGame(opts) {
      const notify = !!(opts && opts.notify);
      try {
        localStorage.setItem(getPrimarySaveKey(), JSON.stringify(buildSavePayload()));
        if (notify) showToast("Partie sauvegardée.");
      } catch (e) {
        if (notify) showToast("Impossible de sauvegarder (stockage plein ?).");
      }
    }

    function applySaveData(data) {
      gameState.currentScene = resolveSceneId(data.currentScene) || "intro_1";
      gameState.skills = { ...defaultState().skills, ...data.skills };
      gameState.notebookNotionKeys = data.notebookNotionKeys || [];
      gameState.unlockedPhilosophers = data.unlockedPhilosophers || defaultState().unlockedPhilosophers;
      gameState.settings = data.settings || {};
      let resume = data.resume && typeof data.resume === "object" ? data.resume : null;
      if (resume && resume.narrative && resume.narrative.sceneId !== gameState.currentScene) resume = null;
      gameState.resume = resume;
      refreshSkillBars();
      renderNotebook();
    }

    function loadGame() {
      const entry = readSaveRaw();
      if (!entry) {
        showToast("Aucune sauvegarde trouvée.");
        return false;
      }
      try {
        const data = JSON.parse(entry.raw);
        const sid = resolveSceneId(data.currentScene);
        if (!sid || !getSceneById(sid)) {
          showToast("Sauvegarde incomplète ou scène inconnue.");
          return false;
        }
        data.currentScene = sid;
        migrateSaveToPrimaryIfNeeded(entry.key, entry.raw);
        applySaveData(data);
        renderScene(gameState.currentScene);
        showToast("Partie chargée.");
        return true;
      } catch (e) {
        showToast("Sauvegarde corrompue.");
        return false;
      }
    }

    function persistStateBeforeUnload() {
      try {
        localStorage.setItem(getPrimarySaveKey(), JSON.stringify(buildSavePayload()));
      } catch (e) { /* ignore */ }
    }

    function showToast(msg, durationMs) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("visible");
      clearTimeout(showToast._h);
      showToast._h = setTimeout(() => t.classList.remove("visible"), durationMs ?? 3200);
    }

    /**
     * Panneau d'échec lisible + bouton « Réessayer » (retire le panneau ; ne change pas la scène).
     */
    function showWrongAttemptPanel(container, opts) {
      if (!container) return;
      const title = opts.title || "Pas tout à fait";
      const bodyHtml = opts.bodyHtml || "<p>Réessaie avec une autre réponse.</p>";
      const retryLabel = opts.retryLabel || "Réessayer";
      container.querySelectorAll(".wrong-attempt-panel").forEach((el) => el.remove());
      const panel = document.createElement("div");
      panel.className = "wrong-attempt-panel";
      panel.setAttribute("role", "alert");
      panel.innerHTML =
        `<h4 class="wrong-attempt-title">${title}</h4>` +
        `<div class="wrong-attempt-body">${bodyHtml}</div>` +
        `<button type="button" class="btn-retry-wrong">${retryLabel}</button>`;
      panel.querySelector(".btn-retry-wrong").addEventListener("click", () => panel.remove());
      container.appendChild(panel);
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
