  { id: "platon", nom: "Platon", dates: "428–348 av. J.-C.", periode: "antiquite", themes: ["La vérité", "La conscience", "L'art"], bio: "Disciple de Socrate, Platon fonde l'Académie. Sa théorie des Idées distingue le monde sensible du monde intelligible. Ses dialogues explorent justice, beauté et vérité.", icon: "📚" },
  { id: "aristote", nom: "Aristote", dates: "384–322 av. J.-C.", periode: "antiquite", themes: ["Le bonheur", "La justice", "La technique", "La nature", "La vérité"], bio: "Élève de Platon, Aristote fonde le Lycée. Son œuvre encyclopédique couvre logique, physique, éthique et politique. Il théorise la vertu comme juste milieu.", icon: "🔬" },
  { id: "epicure", nom: "Épicure", dates: "341–270 av. J.-C.", periode: "antiquite", themes: ["Le bonheur", "La liberté"], bio: "Fondateur de l'épicurisme, Épicure défend un matérialisme atomiste et une éthique du plaisir comme absence de trouble (ataraxie).", icon: "🌿" },
  { id: "descartes", nom: "Descartes", dates: "1596–1650", periode: "moderne", themes: ["La conscience", "La vérité", "La raison"], bio: "Père de la philosophie moderne, Descartes inaugure le rationalisme. Le cogito ('Je pense donc je suis') fonde la certitude sur la conscience.", icon: "💭" },
  { id: "hobbes", nom: "Hobbes", dates: "1588–1679", periode: "moderne", themes: ["La justice", "L'État", "La liberté"], bio: "Philosophe anglais, Hobbes théorise l'état de nature comme guerre de tous contre tous et légitime l'État absolu par le contrat social.", icon: "⚔️" },
  { id: "spinoza", nom: "Spinoza", dates: "1632–1677", periode: "moderne", themes: ["La liberté", "Le bonheur", "La nature"], bio: "Rationaliste hollandais, Spinoza identifie Dieu et la Nature (Deus sive Natura). La liberté consiste dans la connaissance des causes.", icon: "♾️" },
  { id: "locke", nom: "Locke", dates: "1632–1704", periode: "moderne", themes: ["La conscience", "L'État", "La liberté"], bio: "Empiriste anglais, Locke défend le gouvernement limité et les droits naturels. L'esprit est une tabula rasa que l'expérience remplit.", icon: "📜" },
  { id: "rousseau", nom: "Rousseau", dates: "1712–1778", periode: "moderne", themes: ["La liberté", "L'État", "La nature"], bio: "Penseur des Lumières, Rousseau critique le progrès et théorise la volonté générale. L'homme naît bon, la société le corrompt.", icon: "🗽" },
  { id: "hume", nom: "Hume", dates: "1711–1776", periode: "moderne", themes: ["La raison", "La conscience", "La vérité"], bio: "Empiriste écossais, Hume critique la causalité et la substance. La connaissance dérive de l'expérience sensible, la raison est esclave des passions.", icon: "🧩" },
  { id: "kant", nom: "Kant", dates: "1724–1804", periode: "moderne", themes: ["La raison", "La liberté", "Le devoir", "La vérité"], bio: "Kant opère la révolution copernicienne en philosophie. La raison pure structure l'expérience, la raison pratique fonde la morale sur l'impératif catégorique.", icon: "⭐" },
  { id: "hegel", nom: "Hegel", dates: "1770–1831", periode: "moderne", themes: ["La conscience", "L'histoire", "La liberté", "L'État"], bio: "Idéaliste allemand, Hegel conçoit l'histoire comme processus dialectique de réalisation de l'Esprit. La raison est le réel, le réel est la raison.", icon: "🔄" },
  { id: "schopenhauer", nom: "Schopenhauer", dates: "1788–1860", periode: "moderne", themes: ["Le bonheur", "Le désir", "L'art"], bio: "Philosophe pessimiste, Schopenhauer identifie le vouloir-vivre comme essence du monde. L'art et l'ascèse offrent une libération temporaire.", icon: "🎭" },
  { id: "marx", nom: "Marx", dates: "1818–1883", periode: "contemporain", themes: ["Le travail", "L'État", "La justice"], bio: "Philosophe et économiste, Marx critique le capitalisme et théorise la lutte des classes. Le matérialisme historique explique l'évolution sociale.", icon: "⚙️" },
  { id: "nietzsche", nom: "Nietzsche", dates: "1844–1900", periode: "contemporain", themes: ["La vérité", "La morale", "L'art"], bio: "Critique radical, Nietzsche proclame la mort de Dieu et annonce le surhomme. Il dénonce la morale du ressentiment et valorise la volonté de puissance.", icon: "⚡" },
  { id: "freud", nom: "Freud", dates: "1856–1939", periode: "contemporain", themes: ["La conscience", "Le désir", "Le bonheur"], bio: "Fondateur de la psychanalyse, Freud découvre l'inconscient. Le moi n'est pas maître en sa demeure, pris entre ça, surmoi et réalité.", icon: "🧠" },
  { id: "bergson", nom: "Bergson", dates: "1859–1941", periode: "contemporain", themes: ["Le temps", "La conscience", "La liberté"], bio: "Bergson oppose la durée vécue au temps spatialisé. L'intuition saisit l'élan vital, la conscience est flux créateur.", icon: "⏰" },
  { id: "husserl", nom: "Husserl", dates: "1859–1938", periode: "contemporain", themes: ["La conscience", "La vérité", "La raison"], bio: "Fondateur de la phénoménologie, Husserl étudie les structures de la conscience intentionnelle. Retour 'aux choses mêmes' par réduction eidétique.", icon: "👁️" },
  { id: "heidegger", nom: "Heidegger", dates: "1889–1976", periode: "contemporain", themes: ["L'existence", "Le temps", "La technique"], bio: "Heidegger interroge le sens de l'être. Le Dasein (être-là) existe comme être-au-monde temporel. La technique moderne révèle l'oubli de l'être.", icon: "🌲" },
  { id: "sartre", nom: "Sartre", dates: "1905–1980", periode: "contemporain", themes: ["La liberté", "L'existence", "La conscience"], bio: "Existentialiste, Sartre affirme que l'existence précède l'essence. L'homme est condamné à être libre, responsable de ses choix dans un monde absurde.", icon: "🚬" },
  { id: "arendt", nom: "Arendt", dates: "1906–1975", periode: "contemporain", themes: ["La politique", "La justice", "Le travail"], bio: "Philosophe politique, Arendt analyse le totalitarisme et théorise l'action comme essence de la vita activa. La banalité du mal interroge la responsabilité.", icon: "📖" },
  { id: "levinas", nom: "Levinas", dates: "1906–1995", periode: "contemporain", themes: ["Autrui", "La morale", "La justice"], bio: "Levinas place l'éthique au fondement de la philosophie. Le visage d'autrui commande 'Tu ne tueras point' et fonde la responsabilité infinie.", icon: "👤" },
  { id: "foucault", nom: "Foucault", dates: "1926–1984", periode: "contemporain", themes: ["Le pouvoir", "La vérité", "La liberté"], bio: "Foucault analyse les dispositifs de pouvoir-savoir. La vérité est produite historiquement, les normes disciplinent les corps et subjectivités.", icon: "🔍" },
  { id: "deleuze", nom: "Deleuze", dates: "1925–1995", periode: "contemporain", themes: ["Le désir", "La différence", "La création"], bio: "Deleuze pense la différence comme production créatrice. Le désir est machinique, producteur de réel. La philosophie crée des concepts.", icon: "🌊" },
  { id: "derrida", nom: "Derrida", dates: "1930–2004", periode: "contemporain", themes: ["Le langage", "La vérité", "La différence"], bio: "Derrida déconstruit les oppositions métaphysiques. L'écriture précède la parole, la différance diffère et diffère indéfiniment le sens.", icon: "✍️" }
];</script>

const { useState } = React;

function decompressExplanations(b64) {
  try {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(pako.inflate(bytes, { to: 'string' }));
  } catch (e) {
    return {};
  }
}

let EXPLANATIONS = {};
if (typeof EXPLANATIONS_DATA !== 'undefined' && typeof pako !== 'undefined') {
  EXPLANATIONS = decompressExplanations(EXPLANATIONS_DATA);
  console.log('Explications chargées:', Object.keys(EXPLANATIONS).length);
}

function DecompressIframe({ dataOrPromise, title, style, cacheKey, getData }) {
  const containerRef = React.useRef(null);
  const containerStyle = React.useMemo(() => ({
    position: "relative",
    width: "100%",
    height: "100%",
    minHeight: 0,
    ...(style || {}),
  }), [style]);
  React.useEffect(() => {
    const container = containerRef.current;
    if (!container) return;
    let cancelled = false;
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:DM Sans,sans-serif;font-size:13px;color:#6b7280">Chargement\u2026</div>';
    (async () => {
      try {
        let html;
        if (getData) {
          html = await getData();
        } else if (typeof dataOrPromise === 'string' && dataOrPromise.length > 0) {
          html = await getHtml(cacheKey || title, dataOrPromise);
        }
        if (cancelled) return;
        if (html) {
          container.innerHTML = '';
          const iframe = document.createElement('iframe');
          iframe.title = title || '';
          iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none';
          container.appendChild(iframe);
          iframe.srcdoc = html;
        } else {
          container.innerHTML = '<div style="padding:40px 20px;text-align:center"><p style="font-family:DM Sans,sans-serif;font-size:14px;color:#6b7280">Contenu non disponible</p></div>';
        }
      } catch(e) {
        console.error('Decompress error:', e);
        if (!cancelled) container.innerHTML = '<div style="padding:40px 20px;text-align:center"><p style="font-family:DM Sans,sans-serif;font-size:14px;color:#6b7280">Erreur de chargement</p></div>';
      }
    })();
    return () => { cancelled = true; };
  }, [dataOrPromise, cacheKey]);
  return React.createElement("div", { ref: containerRef, style: containerStyle });
}

  { text: `Quand on se suffit à soi-même, on arrive à posséder le bien inestimable qu'est la liberté.`, author: `Épicure`, work: `Lettre à Ménécée` },
  { text: `Il n'y a que la seule volonté, que j'expérimente en moi être si grande, que c'est elle principalement qui me fait connaître que je porte l'image et la ressemblance de Dieu.`, author: `Descartes`, work: `Méditations Métaphysiques, Quatrième Méditation` },
  { text: `Tous les hommes se divisent en esclaves et libres ; car celui qui n'a pas les deux tiers de sa journée pour lui-même est esclave.`, author: `Nietzsche`, work: `Humain trop humain I` },
  { text: `Par Nature naturante, nous devons entendre ce qui est en soi et est conçu par soi. Par Nature naturée, j'entends tout ce qui suit de la nécessité de la nature de Dieu.`, author: `Spinoza`, work: `Éthique, I, prop. 29, scolie` },
  { text: `Il n'y a point de technique s'il n'y a outil, instrument ou machine ; mais ces objets ne font pas eux-mêmes la technique, qui est un genre de pensée.`, author: `Alain`, work: `Éléments de philosophie` },
  { text: `Au reste, tout art consiste à produire, à exécuter, et à combiner les moyens de donner l'existence à quelqu'une des choses qui peuvent être et ne pas être.`, author: `Aristote`, work: `Éthique à Nicomaque` },
  { text: `Le temps absolu, vrai, mathématique, en lui-même et par sa nature, coule uniformément sans relation à rien d'extérieur.`, author: `Newton`, work: `Principia Mathematica` },
  { text: `Ce à partir de quoi le Dasein comprend silencieusement quelque chose comme l'être est le temps.`, author: `Heidegger`, work: `Être et temps` },
  { text: `La vérité de fait est toujours relative à plusieurs personnes : elle concerne des événements et des circonstances dans lesquels beaucoup sont engagés.`, author: `Arendt`, work: `Vérité et politique` },
  { text: `Le hasard n'est que l'ignorance dans laquelle nous nous trouvons des causes véritables qui produisent un événement.`, author: `Hume`, work: `Traité de la nature humaine` },
  { text: `Deux excès : exclure la raison, n'admettre que la raison.`, author: `Pascal`, work: `Pensées` },
  { text: `La grandeur de l'homme est grande en ce qu'il se connaît misérable.`, author: `Pascal`, work: `Pensées` },
  { text: `Le premier moment de la philosophie consiste à révéler à l'opinion la conscience erronée qu'elle a d'elle-même.`, author: `François Châtelet`, work: `Histoire de la philosophie` },
  { text: `Seul ce que l'on n'a pas aussitôt l'habileté de faire du simple fait qu'on le connaît de la manière la plus parfaite relève de l'art.`, author: `Kant`, work: `Critique de la faculté de juger` },
  { text: `La grande majorité des hommes ne travaille que poussée par la nécessité, et de cette naturelle aversion pour le travail qu'ont les hommes découlent les problèmes sociaux les plus ardus.`, author: `Freud`, work: `Malaise dans la civilisation` },
  { text: `Le caractère étranger du travail apparaît nettement dans le fait que, dès qu'il n'existe pas de contrainte physique ou autre, le travail est fui comme la peste.`, author: `Marx`, work: `Manuscrits de 1844` },
  { text: `Par l'art est créé ce grand LÉVIATHAN appelé RÉPUBLIQUE, ou ÉTAT, qui n'est rien d'autre qu'un homme artificiel, quoique d'une stature et d'une force supérieures à celles de l'homme naturel.`, author: `Hobbes`, work: `Leviathan` },
  { text: `On ne doit pas élever les enfants d'après l'état présent de l'espèce humaine, mais d'après un état meilleur.`, author: `Kant`, work: `Traité de pédagogie` },
  { text: `Le gardien de l'État, pour être excellent, doit être à la fois philosophe, colère, agile et fort.`, author: `Platon`, work: `La République` },
  { text: `Ne porte pas tes regards sur le principe directeur des autres, mais regarde droit où te conduit la nature universelle.`, author: `Marc-Aurèle`, work: `Pensées pour moi-même` },
  { text: `Devoir ! nom sublime et grand, toi qui ne renfermes rien en toi d'agréable, mais qui réclames la soumission.`, author: `Kant`, work: `Critique de la raison pratique` },
  { text: `La doctrine de l'égalité ! Mais c'est qu'il n'y a pas de poison plus toxique. 'Aux égaux, traitement égal, aux inégaux, traitement inégal', telle serait la vraie devise de la justice.`, author: `Nietzsche`, work: `Crépuscule des idoles` },
  { text: `L'abolition de la religion en tant que bonheur illusoire du peuple, c'est l'exigence de son bonheur véritable.`, author: `Marx`, work: `Contribution à la critique de la philosophie du droit de Hegel` },
  { text: `On trouve des sociétés qui n'ont ni science, ni art, ni philosophie. Mais il n'y a jamais eu de sociétés sans religion.`, author: `Bergson`, work: `Les Deux sources de la morale et de la religion` },
  { text: `Et que, pour bien diriger, il n'y a que deux choses, l'opinion vraie et la science ; et l'homme qui les possède est un bon guide.`, author: `Platon`, work: `Ménon` },
  { text: `La science est une façon de rapprocher des faits ; elle établit un système de relations.`, author: `Henri Poincaré`, work: `La Valeur de la science` },
  { text: `On ne peut rien fonder sur l'opinion, il faut d'abord la détruire.`, author: `Bachelard`, work: `La Formation de l'esprit scientifique` },
  { text: `La science, dans son besoin d'achèvement, comme dans son principe, s'oppose absolument à l'opinion.`, author: `Bachelard`, work: `La Formation de l'esprit scientifique` },
  { text: `C'est encore et toujours une croyance métaphysique sur quoi repose notre croyance en la science.`, author: `Nietzsche`, work: `Le Gai Savoir` },
  { text: `La soumission de la nature destinée au bonheur humain a entraîné par la démesure de son succès le plus grand défi pour l'être humain.`, author: `Hans Jonas`, work: `Le Principe Responsabilité` },
  { text: `Connais-toi toi-même.`, author: `Socrate`, work: `Apologie de Socrate` },
  { text: `Le doute est le commencement de la sagesse.`, author: `Aristote`, work: `Métaphysique` },
  { text: `Tout ce que je sais, c'est que je ne sais rien.`, author: `Socrate`, work: `Apologie de Socrate` },
  { text: `Nul n'est méchant volontairement.`, author: `Socrate`, work: `Protagoras` },
  { text: `Le temps est l'image mobile de l'éternité immobile.`, author: `Platon`, work: `Timée` },
  { text: `Science sans conscience n'est que ruine de l'âme.`, author: `Rabelais`, work: `Pantagruel` },
  { text: `On ne naît pas femme, on le devient.`, author: `Beauvoir`, work: `Le Deuxième Sexe` },
  { text: `L'enfer, c'est les autres.`, author: `Sartre`, work: `Huis clos` },
  { text: `L'homme se définit par son projet.`, author: `Sartre`, work: `Critique de la raison dialectique` },
  { text: `La banalité du mal.`, author: `Hannah Arendt`, work: `Eichmann à Jérusalem` },
  { text: `Nous croyons que nous pouvons maîtriser toute chose par la prévision. Mais cela revient à désenchanter le monde.`, author: `Max Weber`, work: `Le Métier et la vocation de savant` },
  { text: `L'État, c'est le plus froid de tous les monstres froids : Il ment froidement et voici le mensonge qui rampe de sa bouche : « Moi, l'État, je suis le Peuple. »`, author: `Nietzsche`, work: `Ainsi parlait Zarathoustra` },
  { text: `Par l'art est créé ce grand LÉVIATHAN appelé RÉPUBLIQUE, ou ÉTAT, qui n'est rien d'autre qu'un homme artificiel, quoique d'une stature et d'une force supérieures à celles de l'homme naturel, pour la protection et la défense duquel il a été destiné.`, author: `Hobbes`, work: `Léviathan, 1651` },
  { text: `Tant que les philosophes ne seront pas rois, ou que ceux qu'on appelle aujourd'hui rois et souverains ne seront pas vraiment et sérieusement philosophes, il n'est point de remède aux maux qui désolent les États.`, author: `Platon`, work: `La République` },
  { text: `L'État, c'est le plus froid de tous les monstres froids. Il ment froidement, et voici le mensonge qui rampe de sa bouche : « Moi, l'État, je suis le Peuple. »`, author: `Nietzsche`, work: `Ainsi parlait Zarathoustra` },
  { text: `Il faut concevoir l'État contemporain comme une communauté humaine qui, dans les limites d'un territoire déterminé, revendique avec succès pour son propre compte le monopole de la violence physique légitime.`, author: `Max Weber`, work: `La Vocation du politique, 1919` },
  { text: `Par le mot de penser, j'entends tout ce qui se fait en nous de telle sorte que nous l'apercevons immédiatement par nous-mêmes ; c'est pourquoi non seulement entendre, vouloir, imaginer, mais aussi sentir est la même chose ici que penser.`, author: `Descartes`, work: `Les Principes de la philosophie, I, 9, 1644` },
  { text: `Conscience ! conscience ! instinct divin, immortelle et céleste voix ; juge infaillible du bien et du mal, qui rend l'homme semblable à Dieu, c'est toi qui fais l'excellence de sa nature et la moralité de ses actions.`, author: `Rousseau`, work: `Émile ou De l'éducation, Livre IV, 1762` },
  { text: `Qui dit esprit dit, avant tout, conscience. Mais, qu'est-ce que la conscience ? Conscience signifie d'abord mémoire.`, author: `Bergson`, work: `La Pensée et le mouvant, 1934` },
  { text: `Intuition signifie donc d'abord conscience, mais conscience immédiate, vision qui se distingue à peine de l'objet vu, connaissance qui est contact et même coïncidence.`, author: `Bergson`, work: `La Pensée et le mouvant, Introduction II, 1934` },
  { text: `La « bonne conscience » n'est en général que le fait des gens vraiment mauvais, tandis que seuls les « bonnes gens » sont capables d'avoir mauvaise conscience.`, author: `Hannah Arendt`, work: `La Vie de l'esprit` },
  { text: `La doctrine de l'égalité ! C'est qu'il n'y a pas de poison plus toxique. 'Aux égaux, traitement égal, aux inégaux, traitement inégal', telle serait la vraie devise de la justice. Et ce qui en découle : 'Ne jamais égaliser ce qui est inégal.'`, author: `Nietzsche`, work: `Crépuscule des idoles` },
  { text: `L'autonomie de la volonté est le seul principe de toutes les lois morales et de tous les devoirs qui y sont conformes.`, author: `Kant`, work: `Critique de la raison pratique` },
  { text: `Je suis condamné à être libre. Cela signifie qu'on ne saurait trouver à ma liberté d'autres limites qu'elle-même. Nous ne sommes pas libres de cesser d'être libres.`, author: `Sartre`, work: `L'existentialisme est un humanisme, 1945` },
  { text: `À nos yeux chaque homme est une incarnation de l'humanité tout entière, et comme tel il est égal à tout homme, et libre.`, author: `Louis Dumont`, work: `Homo aequalis, 1977` },
  { text: `La soumission de la nature destinée au bonheur humain a entraîné par la démesure de son succès le plus grand défi pour l'être humain que son faire ait jamais entraîné.`, author: `Hans Jonas`, work: `Le Principe Responsabilité, 1979` },
  { text: `Le livre de la nature est écrit en langage mathématique, et ses caractères sont des triangles, des cercles, et d'autres figures géométriques.`, author: `Galilée`, work: `L'Essayeur, 1623` },
  { text: `La religion est une création défensive de la nature contre la représentation, par l'intelligence, de l'inévitabilité de la mort.`, author: `Bergson`, work: `Les Deux Sources de la morale et de la religion, 1932` },
  { text: `Le Prométhée définitivement déchaîné, auquel la science confère des forces jamais encore connues et l'économie son impulsion effrénée, réclame une éthique qui, par des entraves librement consenties, empêche le pouvoir de l'homme de devenir une malédiction pour lui.`, author: `Hans Jonas`, work: `Le Principe de responsabilité, 1979` },
  { text: `C'est encore et toujours une croyance métaphysique sur quoi repose notre croyance en la science — la croyance que Dieu est la vérité, que la vérité est divine.`, author: `Nietzsche`, work: `Le Gai Savoir, 1882` },
  { text: `L'opinion pense mal ; elle ne pense pas : elle traduit des besoins en connaissances.`, author: `Gaston Bachelard`, work: `La Formation de l'esprit scientifique, 1938` },
  { text: `Avant tout, il faut savoir poser les problèmes.`, author: `Gaston Bachelard`, work: `La Formation de l'esprit scientifique, 1938` },
  { text: `Des sciences de la nature est sortie la technique. Elle a d'abord libéré l'homme de ses difficultés et suscité de nouveaux modes d'existence. Plus tard, elle est devenue ambiguë, dès l'instant où elle a développé parallèlement les chances de progrès et les risques de destruction.`, author: `Karl Jaspers`, work: `Introduction à la philosophie, 1950` },
  { text: `Il n'y a point de technique s'il n'y a outil, instrument ou machine ; mais ces objets, fabriqués de façon à régler l'action, et qui sont comme des méthodes solidifiées, ne font pas eux-mêmes la technique, qui est un genre de pensée.`, author: `Alain`, work: `Système des beaux-arts` },
  { text: `En définitive, l'intelligence est la faculté de fabriquer des objets artificiels, en particulier des outils à faire des outils, et d'en varier indéfiniment la fabrication.`, author: `Bergson`, work: `L'Évolution créatrice, 1907` },
  { text: `Tout art consiste à produire, à exécuter, et à combiner les moyens de donner l'existence à quelqu'une des choses qui peuvent être et ne pas être ; et dont le principe est dans celui qui fait, et non dans la chose qui est faite.`, author: `Aristote`, work: `Éthique à Nicomaque, VI` },
  { text: `Les critères formels universels de la vérité ne sont rien d'autre que les caractères logiques universels de l'accord de la connaissance avec elle-même.`, author: `Kant`, work: `Logique, Introduction, VII` },
  { text: `Tous les hommes recherchent d'être heureux. Cela est sans exception, quelques différents moyens qu'ils y emploient. Ils tendent tous à ce but.`, author: `Pascal`, work: `Pensées` },
  { text: `Le bonheur et le malheur sont deux frères jumeaux qui grandissent ensemble ou, comme chez vous, restent petits ensemble.`, author: `Nietzsche`, work: `Le Gai Savoir, §338` },
  { text: `Ne porte pas tes regards sur le principe directeur des autres, mais regarde droit où te conduit la nature : la nature universelle, par les accidents qui t'arrivent, et ta propre nature, par les devoirs qu'elle t'impose.`, author: `Marc-Aurèle`, work: `Pensées pour moi-même` },
  { text: `Devoir ! nom sublime et grand, toi qui ne renfermes rien en toi d'agréable, mais qui réclames la soumission, la condition indispensable de la seule valeur que les hommes peuvent se donner à eux-mêmes.`, author: `Kant`, work: `Critique de la faculté de juger` },
  { text: `L'autre passe avant moi, je suis pour l'autre. Ce que l'autre a comme devoirs à mon égard, c'est son affaire, ce n'est pas la mienne.`, author: `Emmanuel Levinas`, work: `Éthique et Infini, 1982` },
  { text: `Quand je suis des yeux, sur le cadran de l'horloge, le mouvement de l'aiguille qui correspond aux oscillations du pendule, je ne mesure pas de la durée, comme on paraît le croire ; je me borne à compter des simultanéités, ce qui est bien différent.`, author: `Bergson`, work: `Essai sur les données immédiates de la conscience, Chapitre II` },
  { text: `Ce à partir de quoi le Dasein en général comprend et explicite silencieusement quelque chose comme l'être est le temps.`, author: `Heidegger`, work: `Être et temps, §7` },
  { text: `Dans le travail, il transforme les choses et se transforme en même temps lui-même : il forme les choses et le monde en se transformant, en s'éduquant lui-même.`, author: `Hegel`, work: `Phénoménologie de l'esprit, 1807` },
  { text: `Le caractère étranger du travail apparaît nettement dans le fait que, dès qu'il n'existe pas de contrainte physique ou autre, le travail est fui comme la peste. Le travail extérieur, le travail dans lequel l'homme s'aliène, est un travail de sacrifice de soi, de mortification.`, author: `Marx`, work: `Manuscrits de 1844` },
  { text: `Il y a à tout moment une infinité de perceptions en nous, mais sans aperception et sans réflexion, parce que ces impressions sont ou trop petites et en trop grand nombre, ou trop unies.`, author: `Leibniz`, work: `Nouveaux Essais sur l'entendement humain` },
  { text: `Le cauchemar est bien souvent une réalisation d'un désir qui, loin d'être le bienvenu, est un désir refoulé, repoussé.`, author: `Sigmund Freud`, work: `L'Avenir d'une illusion, 1927` }
];

function buildSocrateKnowledgeBundle() {

  let total = 0;
  try {
    for (const [k, v] of Object.entries(explanations)) {
      let s = typeof v === "string" ? v : JSON.stringify(v);
      if (s.length > maxEach) s = s.slice(0, maxEach) + "\n…[tronqué]";
      if (total + s.length > maxTotal) break;
      trimmed[k] = s;
      total += s.length;
    }
  } catch (err) {}
  return {
    explanations: trimmed,
    notionIndex: notions.map((n) => ({
      name: n.name,
      ficheKey: n.fiche || null,
      hint: n.fiche
        ? "Réviser → Les 17 notions → " + n.name + " → « Voir le cours »"
        : "Réviser → Les 17 notions → " + n.name + " (bientôt)",
    })),
  };
}

function stripSocrateActions(text) {
  if (!text) return "";
  return String(text)
    .replace(/\[\[ACTION:[^\]]+\]\]/g, "")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

function extractSocrateActions(text) {
  const re = /\[\[ACTION:([a-z0-9_-]+):([^\]]*)\]\]/gi;
  const out = [];
  let m;
  const s = String(text || "");
  while ((m = re.exec(s)) !== null) {
    out.push({ type: m[1].toLowerCase(), payload: (m[2] || "").trim() });
  }
  return out;
}

function socrateActionLabel(type, payload) {
  const map = {
    open_notion: "Ouvrir la fiche",
    open_notions_list: "Ouvrir les 17 notions",
    open_lexique: "Ouvrir le lexique",
    open_methodologie: "Ouvrir la méthodologie",
    open_synthese: "Vue d'ensemble",
    open_controles: "Contrôles de connaissances",
    screen: "Aller à l'écran",
  };
  const base = map[type] || type;
  return payload ? base + " · " + payload : base;
}

  const [loading, setLoading] = React.useState(false);
  
  const startDialogue = async () => {
    if (!auteur1 || !auteur2 || !notion) return;
    setLoading(true);
    setDialogue("");
    const a1 = AUTEURS_DATA.find(a => a.id === auteur1);
    const a2 = AUTEURS_DATA.find(a => a.id === auteur2);
    try {
      const response = await fetch("/.netlify/functions/anthropic", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          messages: [{
            role: "user",
            content: `Tu es un expert en philosophie. Crée un dialogue authentique entre ${a1.nom} (${a1.dates}) et ${a2.nom} (${a2.dates}) sur le thème: "${notion}".

Règles strictes:
- Respecte fidèlement leur pensée historique
- Utilise leur vocabulaire et concepts propres
- Fais-les se confronter sur leurs divergences réelles

- Sois précis, profond, évite les banalités

Commence directement le dialogue.`
          }]
        })
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n').filter(l => l.trim());
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);

                setDialogue(prev => prev + parsed.delta.text);
              }

function readNetlifyIdentityProfile() {
  try {
    if (typeof window === "undefined" || typeof window.netlifyIdentity === "undefined" || typeof window.netlifyIdentity.currentUser !== "function") {
      return { displayName: "", email: "", initial: "·" };
    }
    const u = window.netlifyIdentity.currentUser();
    if (!u) return { displayName: "", email: "", initial: "·" };
    const meta = u.user_metadata || {};
    const fullName = meta.full_name != null && String(meta.full_name).trim() ? String(meta.full_name).trim() : "";
    const email = u.email != null && String(u.email).trim() ? String(u.email).trim() : "";
    const displayName = fullName || email || "";
    const forInitial = (displayName || email || "·").trim();
    const ch = forInitial.length ? forInitial.charAt(0) : "·";
    const initial = ch && ch.toLocaleUpperCase ? ch.toLocaleUpperCase("fr") : String(ch).toUpperCase();
    return { displayName, email, initial };
  } catch (e) {
    return { displayName: "", email: "", initial: "·" };
  }
}

  const homeNavIgnoreRef = React.useRef(false);
  const gestureLayerRef = React.useRef(null);
  const swipeTapReleaseTimerRef = React.useRef(null);
  const swipeHasMovedRef = React.useRef(false);
  const [homeSwipeAnim, setHomeSwipeAnim] = React.useState(null);
  const changeTheme = (key) => {
    currentThemeKey = key;
    setThemeKey(key);
    try { localStorage.setItem("philoprep-theme", key); } catch(e) {}
  };

  const navigate = (s, dir = "right") => {
    if (s === "home" && homeNavIgnoreRef.current) return;
    setAnimKey((k) => k + 1);
    setScreen(s);
  };
  const [sentrainerInitialTab, setSentrainerInitialTab] = React.useState(null);
  const [sentrainerSurfaceTab, setSentrainerSurfaceTab] = React.useState("jeux");
  const onSentrainerTabChange = React.useCallback((tabId) => {
    setSentrainerSurfaceTab(tabId);
  }, []);

  const homeSwipeMobileEligible = () => {
    if (typeof window === "undefined") return false;
    try {
      if (window.matchMedia && (window.matchMedia("(max-width: 900px)").matches || window.matchMedia("(pointer: coarse)").matches)) return true;
    } catch (e) {}
    return typeof window.ontouchstart !== "undefined";
  };

  const getMainCarouselIndex = () => {
    if (screen === "home") return 0;
    if (screen === "simulation-bac") return 2;
    if (screen === "sentrainer") {
      if (sentrainerSurfaceTab === "exercices") return 3;
      return 1;
    }
    return 0;
  };

  const applyMainCarouselIndex = (idx) => {
    const i = ((idx % 4) + 4) % 4;
    // Navigation between main sections should close overlay modals.
    setFicheModalOpen(false);
    setSyntheseModalOpen(false);
    setCitationsModalOpen(false);
    setAuteursModalOpen(false);
    setDialogueModalOpen(false);
    setPerspectivesModalOpen(false);
    setLexiqueModalOpen(false);
    setChoixSujetModalOpen(false);
    setPhilosophiaModalOpen(false);
    setMethodologieModalOpen(false);
    setMethodePasAPasModalOpen(false);
    setDissertationsCorrigeesModalOpen(false);
    setControlesModalOpen(false);
    setExercicesLibresModalOpen(false);
    setPhiloquestModalOpen(false);
    setPhilomindModalOpen(false);
    setPhilorushModalOpen(false);
    setPhilodoxaModalOpen(false);
    setPhilologiqueModalOpen(false);
    setNotionsModalOpen(false);
    setShowNotionTestMode(false);
    setSocrateOpen(false);
    if (i === 0) {
      navigate("home", "left");
    } else if (i === 1) {
      setSentrainerInitialTab("parcours-guide");
      setSentrainerSurfaceTab("parcours-guide");
      navigate("sentrainer", "right");
    } else if (i === 2) {
      setSentrainerInitialTab(null);
      navigate("simulation-bac", "right");
    } else {
      setSentrainerInitialTab("exercices");
      setSentrainerSurfaceTab("exercices");
      navigate("sentrainer", "right");
    }
  };

  const handleMainCarouselSwipe = (directionSign) => {
    if (screen === "auth" || screen === "splash") return;
    if (!homeSwipeMobileEligible() || homeSwipeInteractionBlocked()) return;
    if (homeNavIgnoreRef.current) return;
    if (homeSwipeLockRef.current) return;
    const cur = getMainCarouselIndex();
    const next = directionSign > 0 ? (cur + 1) % 4 : (cur + 3) % 4;
    applyMainCarouselIndex(next);
    homeSwipeLockRef.current = true;
    setTimeout(() => { homeSwipeLockRef.current = false; }, 480);
  };

  const onMainCarouselTouchStart = (e) => {
    if (screen === "auth" || screen === "splash") return;
    if (!homeSwipeMobileEligible() || homeSwipeInteractionBlocked()) return;
    swipeHasMovedRef.current = false;
    if (swipeTapReleaseTimerRef.current) {
      clearTimeout(swipeTapReleaseTimerRef.current);
      swipeTapReleaseTimerRef.current = null;
    }
    const t = e.touches[0];
    homeSwipeTouchRef.current = { armed: true, x0: t.clientX, y0: t.clientY, t0: Date.now() };
    // If the user is only tapping (no movement), relinquish touch handling quickly
    // so the iframe/content can receive the click.
    swipeTapReleaseTimerRef.current = setTimeout(() => {
      if (!swipeHasMovedRef.current && homeSwipeTouchRef.current.armed) {
        homeSwipeTouchRef.current.armed = false;
        setGestureLayerPointerEvents("none");
      }
    }, 120);
  };

  const setGestureLayerPointerEvents = (val) => {
    if (gestureLayerRef.current) gestureLayerRef.current.style.pointerEvents = val;
  };

  const onMainCarouselTouchMove = (e) => {
    if (screen === "auth" || screen === "splash") return;
    if (!homeSwipeMobileEligible()) return;
    if (!homeSwipeTouchRef.current.armed) return;
    swipeHasMovedRef.current = true;
    if (swipeTapReleaseTimerRef.current) {
      clearTimeout(swipeTapReleaseTimerRef.current);
      swipeTapReleaseTimerRef.current = null;
    }
    const t = e.touches[0];
    const dx = t.clientX - homeSwipeTouchRef.current.x0;
    const dy = t.clientY - homeSwipeTouchRef.current.y0;
    // If the gesture is clearly vertical, pass touch handling to the underlying iframe/content.
    if (Math.abs(dy) > 18 && Math.abs(dy) > Math.abs(dx) * 1.22) {
      homeSwipeTouchRef.current.armed = false;
      setGestureLayerPointerEvents("none");
    }
  };

  const onMainCarouselTouchEnd = (e) => {
    if (screen === "auth" || screen === "splash") return;
    if (!homeSwipeTouchRef.current.armed) return;
    if (swipeTapReleaseTimerRef.current) {
      clearTimeout(swipeTapReleaseTimerRef.current);
      swipeTapReleaseTimerRef.current = null;
    }
    homeSwipeTouchRef.current.armed = false;
    // Always let the click/tap go to the underlying iframe/content.
    setGestureLayerPointerEvents("none");
    if (homeSwipeInteractionBlocked() || !homeSwipeMobileEligible()) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - homeSwipeTouchRef.current.x0;
    const dy = t.clientY - homeSwipeTouchRef.current.y0;
    const dt = Date.now() - homeSwipeTouchRef.current.t0;
    if (dt > 950) return;
    if (Math.abs(dx) < 58 || Math.abs(dx) < Math.abs(dy) * 1.22) return;
    if (homeNavIgnoreRef.current || homeSwipeLockRef.current) return;
    const outDir = dx > 0 ? "next" : "prev";
    try { e.preventDefault(); } catch (err) {}
    try { e.stopPropagation(); } catch (err) {}
    setHomeSwipeAnim(outDir);

                <div style={{ width: "30px", height: "0.5px", background: "linear-gradient(90deg, rgba(255,255,255,0.25), transparent)" }} />

              style={{
                flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative",
                touchAction: "auto",
                animation: homeSwipeAnim ? `homeSwipeMainOut 0.26s ease-out forwards` : "fadeIn 0.3s ease-out",
                ["--home-swipe-dx"]: homeSwipeAnim === "next" ? "18px" : homeSwipeAnim === "prev" ? "-18px" : "0px",
              }}
            >
              <div
                ref={gestureLayerRef}
                style={{
                  position: "absolute",
                  inset: 0,
                  zIndex: 140,
                  background: "transparent",

                  if (!(homeSwipeMobileEligible() && screen !== "auth" && screen !== "splash")) return;
                  setGestureLayerPointerEvents("auto");
                  onMainCarouselTouchStart(e);

                onTouchMove={(e) => onMainCarouselTouchMove(e)}
                onTouchEnd={(e) => onMainCarouselTouchEnd(e)}
                onTouchCancel={() => {
                  homeSwipeTouchRef.current.armed = false;
                  if (swipeTapReleaseTimerRef.current) {
                    clearTimeout(swipeTapReleaseTimerRef.current);

                  }

              else if (s === "sentrainer-ia") {
                setSentrainerInitialTab("exercices");
                setSentrainerSurfaceTab("exercices");
                navigate("sentrainer", "right");
              } else if (s === "sentrainer") {
                setSentrainerInitialTab(null);
                setSentrainerSurfaceTab("jeux");
                navigate(s, "right");
              } else {
                setSentrainerInitialTab(null);
                navigate(s, "right");

              <>
                <div onClick={() => setProfileMenuOpen(false)} style={{
                  position: "absolute", inset: 0, zIndex: 80,
                  background: T().menuOverlay,
                  backdropFilter: "blur(36px) saturate(1.3)", WebkitBackdropFilter: "blur(36px) saturate(1.3)",

                  display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                }}>
                  <div onClick={(e) => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "80%", maxWidth: 280 }}>
                    <div style={{ position: "absolute", top: 16, right: 16, cursor: "pointer" }} onClick={() => setProfileMenuOpen(false)}>
                      <SvgIcon name="x" size={18} color="rgba(255,255,255,0.4)" />
                    </div>
                    <div style={{
                      width: 60, height: 60, borderRadius: "50%",
                      background: "rgba(255,255,255,0.12)", backdropFilter: "blur(16px)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      marginBottom: "18px",
                      boxShadow: "0 4px 24px rgba(240,160,48,0.1), inset 0 1px 0 rgba(255,255,255,0.1)",
                      border: "0.5px solid rgba(255,255,255,0.1)",
                    }}>
                      <span style={{ fontSize: "24px", fontWeight: 400, color: T().cream, fontFamily: "'Cormorant Garamond', Georgia, serif" }}>{identityInitial || "·"}</span>
                    </div>
                    <div style={{ fontSize: "17px", fontWeight: 400, color: T().cream, marginBottom: "4px", fontFamily: "'Cormorant Garamond', Georgia, serif", letterSpacing: "0.5px" }}>{identityDisplayName || identityEmail || "Compte"}</div>
                    <div style={{ fontSize: "10px", color: "rgba(253,246,227,0.35)", marginBottom: "18px", fontFamily: "'DM Sans', system-ui, sans-serif", letterSpacing: identityEmail && identityDisplayName && identityDisplayName !== identityEmail ? "0.5px" : "1px" }}>{identityEmail && identityDisplayName && identityDisplayName !== identityEmail ? identityEmail : "Terminale"}</div>
                    <div style={{ display: "flex", gap: "20px", marginBottom: "24px" }}>
                      <div style={{ textAlign: "center" }}><div style={{ fontSize: "18px", fontWeight: 500, color: "rgba(200,155,30,0.8)" }}>7</div><div style={{ fontSize: "9px", color: T().creamSoft }}>jours</div></div>
                      <div style={{ width: "0.5px", height: "32px", background: "rgba(255,255,255,0.1)" }} />
                      <div style={{ textAlign: "center" }}><div style={{ fontSize: "18px", fontWeight: 500, color: "rgba(200,155,30,0.8)" }}>35%</div><div style={{ fontSize: "9px", color: T().creamSoft }}>progression</div></div>
                      <div style={{ width: "0.5px", height: "32px", background: "rgba(255,255,255,0.1)" }} />
                      <div style={{ textAlign: "center" }}><div style={{ fontSize: "18px", fontWeight: 500, color: "rgba(200,155,30,0.8)" }}>12</div><div style={{ fontSize: "9px", color: T().creamSoft }}>fiches</div></div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "2px", width: "100%" }}>
                      {[
                        { icon: "user", label: "Mon profil" },
                        { icon: "stats", label: "Statistiques" },
                        { icon: "settings", label: "Paramètres", screen: "settings" },
                      ].map((item) => (
                        <button key={item.label} onClick={() => { setProfileMenuOpen(false); if (item.screen) navigate(item.screen, "right"); }} style={{
                          background: "none", border: "none", padding: "12px 8px",
                          display: "flex", alignItems: "center", gap: "10px",
                          cursor: "pointer", width: "100%",
                          borderBottom: "0.5px solid rgba(255,255,255,0.06)",
                        }}>
                          <SvgIcon name={item.icon} size={14} color="rgba(253,246,227,0.5)" />
                          <span style={{ fontSize: "13px", color: "rgba(253,246,227,0.7)" }}>{item.label}</span>
                        </button>
                      ))}
                      <button onClick={() => { setProfileMenuOpen(false); if (window.netlifyIdentity) netlifyIdentity.logout(); }} style={{
                        background: "none", border: "none", padding: "12px 8px",
                        display: "flex", alignItems: "center", gap: "10px",
                        cursor: "pointer", width: "100%", marginTop: "8px",
                      }}>
                        <SvgIcon name="logout" size={14} color="rgba(200,100,100,0.5)" />
                        <span style={{ fontSize: "13px", color: "rgba(200,100,100,0.6)" }}>Déconnexion</span>
                      </button>
                    </div>
                  </div>
                </div>
              </>
            )}
                        <ContentModal open={ficheModalOpen && !!selectedNotion} onClose={closeFiche} title={selectedNotion ? selectedNotion.name : ""} iconName={selectedNotion ? selectedNotion.svgIcon : null} iconColor={selectedNotion ? (selectedNotion.shade || "#1a3fa0") + "99" : null} getData={selectedNotion ? () => getFiche(selectedNotion.fiche) : null} cacheKey={selectedNotion ? "fiche_" + selectedNotion.fiche : ""} showMenu={showNotionMenu} onViewCourse={() => { setShowNotionMenu(false); setShowNotionTestMode(false); }} onTestKnowledge={() => { homeNavIgnoreRef.current = true; homeSwipeLockRef.current = true; setTimeout(() => { homeNavIgnoreRef.current = false; homeSwipeLockRef.current = false; }, 1200); setShowNotionMenu(false); setShowNotionTestMode(true); }} canTestKnowledge={selectedNotion && ["conscience", "bonheur", "inconscient", "langage", "liberte", "technique", "temps", "verite", "nature"].includes(selectedNotion.fiche)} showTestMode={showNotionTestMode} testGetData={selectedNotion ? ({ conscience: getConscienceTest, bonheur: getBonheurQuizFile, inconscient: getInconscientQuizFile, langage: getLangageQuizFile, liberte: getLiberteQuizFile, technique: getTechniqueQuizFile, temps: getTempsQuizFile, verite: getVeriteQuizFile, nature: getNatureQuizFile }[selectedNotion.fiche] || null) : null} testCacheKey={selectedNotion ? "test_" + selectedNotion.fiche : ""} notionShade={selectedNotion ? selectedNotion.shade : null} />

                        <DialogueModal open={dialogueModalOpen} onClose={() => setDialogueModalOpen(false)} />
                        <ContentModal open={perspectivesModalOpen} onClose={() => setPerspectivesModalOpen(false)} title="Perspectives philosophiques" iconName="compass" dataOrPromise={PERSPECTIVES_DATA} cacheKey="perspectives" />
                        <ContentModal open={lexiqueModalOpen} onClose={closeLexique} title="Lexique philosophique" iconName="bookOpen" getData={getLexiqueFile} cacheKey="lexique_file" />

                        <ContentModal open={philosophiaModalOpen} onClose={closePhilosophia} title="PhiloSophia" iconName="compass" dataOrPromise={PHILOSOPHIA_DATA} cacheKey="philosophia" />

            <ContentModal open={philomindModalOpen} onClose={closePhilomind} title="PhiloMind" iconName="search" dataOrPromise={PHILOMIND_DATA} cacheKey="philomind" />
            <ContentModal open={philorushModalOpen} onClose={closePhilorush} title="PhiloRush" iconName="target" dataOrPromise={PHILORUSH_DATA} cacheKey="philorush" />
            <ContentModal open={philodoxaModalOpen} onClose={closePhilodoxa} title="PhiloDoxa" iconName="messageCircle" dataOrPromise={PHILODOXA_DATA} cacheKey="philodoxa" />
            <ContentModal open={philologiqueModalOpen} onClose={closePhilologique} title="PhiloLogique" iconName="zap" dataOrPromise={PHILOLOGIQUE_DATA} cacheKey="philologique" />
                        <ContentModal open={methodologieModalOpen} onClose={closeMethodologie} title="Méthode de la dissertation" iconName="fileText" dataOrPromise={METHODOLOGIE_DATA} cacheKey="methodologie" />
                        <ContentModal open={methodePasAPasModalOpen} onClose={closeMethodePasAPas} title="La méthode pas à pas" iconName="terminal" dataOrPromise={METHODE_PAS_A_PAS_DATA} cacheKey="methode_pas_a_pas" />

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Handle email confirmation/recovery links without interfering with in-app navigation.
  const initialHash = window.location.hash || "";
  const hadEmailToken =
    initialHash.includes('confirmation_token') ||
    initialHash.includes('recovery_token') ||
    initialHash.includes('invite_token');

  if (hadEmailToken && window.netlifyIdentity) {
    // Wait for Identity to be fully ready
    const checkAndOpen = setInterval(() => {
      if (window.netlifyIdentity && typeof window.netlifyIdentity.open === 'function') {
        clearInterval(checkAndOpen);
        window.netlifyIdentity.open();

        // Clear hash so later login events don't cause another full reload.
        try {
          window.history.replaceState(null, document.title, window.location.pathname + window.location.search);
        } catch (e) {}
      }
    }, 100);

    // Timeout after 5 seconds
    setTimeout(() => clearInterval(checkAndOpen), 5000);

    // IMPORTANT: Do not hard-redirect (location.href) here.
    // The React app already switches to the "home" screen on "login".
  }
</script>
</body>
</html>
